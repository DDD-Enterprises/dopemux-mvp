# Dopemux MCP Servers - Complete Docker Orchestration
# Based on ADR-007 (Routing Logic) and ADR-012 (MCP Integration Patterns)

networks:
  mcp-network:
    driver: bridge
  dopemux-unified-network:
    external: true

volumes:
  mcp_logs:
  mcp_cache:
  mcp_litellm_data:
  dope_memory_data:
  postgres_data:
  redis_data:
  qdrant_data:

services:
  # === INFRASTRUCTURE SERVICES ===

  # PostgreSQL with AGE extension for ConPort
  postgres:
    image: apache/age:release_PG16_1.6.0
    container_name: "${DOPEMUX_STACK_PREFIX:-dopemux}-postgres-age"
    restart: unless-stopped
    environment:
      - POSTGRES_USER=dopemux_age
      - POSTGRES_PASSWORD=dopemux_age_dev_password
      - POSTGRES_DB=dopemux_knowledge_graph
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - mcp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dopemux_age -d dopemux_knowledge_graph"]
      timeout: 5s
      retries: 10
      interval: 10s

  # Redis for caching and event bus
  redis:
    image: redis:7-alpine
    container_name: "${DOPEMUX_STACK_PREFIX:-dopemux}-redis-primary"
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - mcp-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 3s
      retries: 3
      interval: 10s

  # Qdrant vector database for Dope-Context
  qdrant:
    image: qdrant/qdrant:latest
    container_name: "${DOPEMUX_STACK_PREFIX:-dopemux}-qdrant"
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    networks:
      - mcp-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333 || exit 1"]
      timeout: 5s
      retries: 3
      interval: 10s

  # === CRITICAL PATH SERVERS (Priority: High) ===

  # PAL - Multi-model orchestration and complex decision making
  pal:
    build:
      context: ./pal
      dockerfile: Dockerfile
    container_name: "${DOPEMUX_STACK_PREFIX:-dopemux}-mcp-pal"
    restart: unless-stopped
    networks:
      - mcp-network
    environment:
      - OPENAI_API_KEY=""  # Disabled - no direct OpenAI calls
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - XAI_API_KEY=${XAI_API_KEY}
      - DISABLED_TOOLS=analyze,refactor,testgen,secaudit,docgen,tracer
      - DEFAULT_MODEL=auto
      - PAL_DEFAULT_PROVIDER=openrouter  # Prefer OpenRouter for routing
      - MCP_SERVER_PORT=3003
      - MCP_TRANSPORT=http
    ports:
      - "3003:3003"
    working_dir: /app
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 45s
    labels:
      - "mcp.role=critical_path"
      - "mcp.priority=highest"
      - "mcp.description=Multi-model orchestration"

  # LiteLLM - Unified LLM proxy with routing and fallbacks
  litellm:
    build:
      context: ../../
      dockerfile: docker/mcp-servers/litellm/Dockerfile
    container_name: "${DOPEMUX_STACK_PREFIX:-dopemux}-mcp-litellm"
    restart: unless-stopped
    network_mode: host  # Use host networking to access postgres on localhost:5432
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=sk-master-dopemux-local-20251101
      - XAI_API_KEY=${XAI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-master-dopemux-local-20251101}
      - DATABASE_URL=postgresql://dopemux_age:dopemux_age_dev_password@localhost:5432/litellm
      - LITELLM_LOG=INFO
      - LITELLM_DROP_PARAMS=true
    # Note: network_mode: host means no port mapping needed (uses host's port 4000)
    healthcheck:
      test: ["CMD-SHELL", "curl -f -H 'Authorization: Bearer sk-master-dopemux-local-20251101' http://localhost:4000/health || exit 1"]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 60s
    volumes:
      - ../../litellm.config.yaml:/app/config.yaml:ro
      - mcp_litellm_data:/app/data
    labels:
      - "mcp.role=critical_path"
      - "mcp.priority=high"
      - "mcp.description=Unified LLM proxy with intelligent routing and cost tracking"

  # ConPort - Project memory and decision tracking
  conport:
    build:
      context: ./conport
      dockerfile: Dockerfile
    container_name: "${DOPEMUX_STACK_PREFIX:-dopemux}-mcp-conport"
    restart: unless-stopped
    networks:
      - mcp-network
    environment:
      - AGE_HOST=postgres
      - AGE_PORT=5432
      - AGE_PASSWORD=dopemux_age_dev_password
      - MCP_SERVER_PORT=3004
    ports:
      - "3004:3004"
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3004/health || exit 0"]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 45s
    labels:
      - "mcp.role=critical_path"
      - "mcp.priority=high"
      - "mcp.description=Project memory and decision tracking"

  # Serena - ADHD-optimized code navigation and project memory
  serena:
    build:
      context: ./serena
      dockerfile: Dockerfile
    container_name: "${DOPEMUX_STACK_PREFIX:-dopemux}-mcp-serena"
    restart: unless-stopped
    networks:
      - mcp-network
    environment:
      - MCP_SERVER_PORT=3006
    ports:
      - "3006:3006"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3006/health || exit 0"]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 45s
    labels:
      - "mcp.role=critical_path"
      - "mcp.priority=high"
      - "mcp.description=ADHD-optimized code navigation and project memory"

  # Dope-Context - Semantic search and context management
  dope-context:
    build:
      context: ./dope-context
      dockerfile: Dockerfile
    container_name: "${DOPEMUX_STACK_PREFIX:-dopemux}-mcp-dope-context"
    restart: unless-stopped
    networks:
      - mcp-network
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - MCP_SERVER_PORT=3010
    ports:
      - "3010:3010"
    depends_on:
      - qdrant
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3010/health || exit 0"]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 45s
    labels:
      - "mcp.role=critical_path"
      - "mcp.priority=high"
      - "mcp.description=Semantic search and context management"

  # Dope-Memory - Temporal chronicle and working-context manager
  dope-memory:
    build:
      context: ../../services/working-memory-assistant
      dockerfile: Dockerfile.dope-memory
    container_name: "${DOPEMUX_STACK_PREFIX:-dopemux}-mcp-dope-memory"
    restart: unless-stopped
    networks:
      - mcp-network
    environment:
      - PORT=${DOPE_MEMORY_PORT:-3020}
      - DOPE_MEMORY_PORT=${DOPE_MEMORY_PORT:-3020}
      - DOPE_MEMORY_WORKSPACE_ID=dopemux
      - DOPE_MEMORY_INSTANCE_ID=${DOPEMUX_INSTANCE_ID:-A}
      - LOG_LEVEL=INFO
    ports:
      - "${DOPE_MEMORY_PORT:-3020}:${DOPE_MEMORY_PORT:-3020}"
    volumes:
      - dope_memory_data:/home/dopememory/.dope-memory
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${DOPE_MEMORY_PORT:-3020}/health || exit 1"]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 45s
    labels:
      - "mcp.role=critical_path"
      - "mcp.priority=high"
      - "mcp.description=Temporal chronicle and working-context manager"

  # === WORKFLOW SERVERS (Priority: Medium) ===

  # Plane Coordinator - Cross-plane coordination and authority enforcement
  plane-coordinator:
    build:
      context: ./plane-coordinator
      dockerfile: Dockerfile
    container_name: "${DOPEMUX_STACK_PREFIX:-dopemux}-mcp-plane-coordinator"
    restart: unless-stopped
    networks:
      - mcp-network
    environment:
      - MCP_SERVER_PORT=8090
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8090/health || exit 0"]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 45s
    labels:
      - "mcp.role=workflow"
      - "mcp.priority=medium"
      - "mcp.description=Cross-plane coordination and authority enforcement"

  # === RESEARCH & QUALITY SERVERS (Priority: Low) ===

  # GPT Researcher - Autonomous research and information gathering
  gptr-mcp:
    build:
      context: ./gptr-mcp
      dockerfile: Dockerfile
    container_name: "${DOPEMUX_STACK_PREFIX:-dopemux}-mcp-gptr-mcp"
    restart: unless-stopped
    networks:
      - mcp-network
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - MCP_SERVER_PORT=3009
    ports:
      - "3009:3009"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3009/health || exit 0"]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 45s
    labels:
      - "mcp.role=research"
      - "mcp.priority=low"
      - "mcp.description=Autonomous research and information gathering"

  # Exa - Neural search and research augmentation
  exa:
    build:
      context: ./exa
      dockerfile: Dockerfile
    container_name: "${DOPEMUX_STACK_PREFIX:-dopemux}-mcp-exa"
    restart: unless-stopped
    networks:
      - mcp-network
    environment:
      - EXA_API_KEY=${EXA_API_KEY}
      - MCP_SERVER_PORT=3008
    ports:
      - "3008:3008"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3008/health || exit 0"]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 45s
    labels:
      - "mcp.role=research"
      - "mcp.priority=low"
      - "mcp.description=Neural search and research augmentation"

  # Desktop Commander - Desktop automation and GUI control
  desktop-commander:
    build:
      context: ./desktop-commander
      dockerfile: Dockerfile
    container_name: "${DOPEMUX_STACK_PREFIX:-dopemux}-mcp-desktop-commander"
    restart: unless-stopped
    networks:
      - mcp-network
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - MCP_SERVER_PORT=3012
    ports:
      - "3012:3012"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3012/health || exit 0"]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 45s
    labels:
      - "mcp.role=utility"
      - "mcp.priority=low"
      - "mcp.description=Desktop automation and GUI control"
