litellm_settings:
  timeout: 120
  max_retries: 3
  drop_params: true
  model_alias_map:
    grok-code: grok-code-fast-1
    grok: grok-4-fast
    minimax: minimax-m2-free
    codex: gpt-5-codex
    claude-sonnet: gpt-5
    claude-sonnet-4.5: gpt-5
    claude-haiku: gpt-5-mini
    claude-opus: o3-pro
    fast: grok-4-fast
    free: minimax-m2-free
    research: o3-deep-research
    pro: gpt-5-pro
router_settings:
  routing_strategy: simple-shuffle
  enable_pre_call_checks: false
  allowed_fails: 3
  cooldown_time: 30
  num_retries: 3
  retry_policy:
    TimeoutErrorRetries: 3
    RateLimitErrorRetries: 4
    AuthenticationErrorRetries: 1
    ContentPolicyViolationRetries: 1
  fallbacks:
  - grok-4-fast:
    - gpt-5
    - minimax-m2-free
  - grok-code-fast-1:
    - gpt-5-codex
    - gpt-5
  - o3-deep-research:
    - o3-pro
    - o3
  - o4-mini-deep-research:
    - o3
    - gpt-5
  - gpt-5-pro:
    - gpt-5
    - grok-4-fast
  - gpt-5:
    - grok-4-fast
    - minimax-m2-free
  - gpt-5-mini:
    - minimax-m2-free
    - grok-4-fast
  - minimax-m2-free:
    - grok-4-fast
    - gpt-5-mini
general_settings:
  master_key: <REDACTED_LITELLM_MASTER_KEY>
