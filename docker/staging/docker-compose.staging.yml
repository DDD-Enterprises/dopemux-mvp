version: '3.8'

services:
  # ========================================
  # Infrastructure Services
  # ========================================

  redis:
    image: redis:7-alpine
    container_name: dopemux-staging-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_staging_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - dopemux-staging

  postgres:
    image: postgres:16-alpine
    container_name: dopemux-staging-postgres
    environment:
      POSTGRES_DB: dopemux_staging
      POSTGRES_USER: dopemux_staging
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5455:5432"
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
      - ./init-postgres.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dopemux_staging"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - dopemux-staging

  # ========================================
  # Application Services
  # ========================================

  integration-bridge:
    build:
      context: ../../services/mcp-integration-bridge
      dockerfile: Dockerfile
    container_name: dopemux-staging-integration-bridge
    environment:
      PORT_BASE: "3000"
      ORCHESTRATOR_URL: "http://task-orchestrator:3017"
      USE_MOCK_FALLBACK: "false"
      LOG_LEVEL: "INFO"
      REDIS_URL: "redis://redis:6379"
    ports:
      - "3016:3016"
    depends_on:
      redis:
        condition: service_healthy
      task-orchestrator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3016/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - dopemux-staging

  task-orchestrator:
    build:
      context: ../../services/task-orchestrator
      dockerfile: Dockerfile
    container_name: dopemux-staging-task-orchestrator
    environment:
      PORT_BASE: "3000"
      REDIS_URL: "redis://redis:6379"
      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: "5432"
      POSTGRES_DB: "dopemux_staging"
      POSTGRES_USER: "dopemux_staging"
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      LOG_LEVEL: "INFO"
      WORKSPACE_ID: "/app/workspace"
    ports:
      - "3000:3000"  # Main API
      - "3017:3017"  # Query Server
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3017/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - dopemux-staging
    volumes:
      - workspace_staging_data:/app/workspace

  # ========================================
  # Monitoring Services (Optional)
  # ========================================

  prometheus:
    image: prom/prometheus:latest
    container_name: dopemux-staging-prometheus
    profiles:
      - monitoring
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_staging_data:/prometheus
    restart: unless-stopped
    networks:
      - dopemux-staging

  grafana:
    image: grafana/grafana:latest
    container_name: dopemux-staging-grafana
    profiles:
      - monitoring
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: redis-datasource
    ports:
      - "3030:3000"
    volumes:
      - grafana_staging_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - dopemux-staging

# ========================================
# Networks
# ========================================

networks:
  dopemux-staging:
    driver: bridge
    name: dopemux-staging-network

# ========================================
# Volumes
# ========================================

volumes:
  redis_staging_data:
    name: dopemux_staging_redis_data
  postgres_staging_data:
    name: dopemux_staging_postgres_data
  workspace_staging_data:
    name: dopemux_staging_workspace_data
  prometheus_staging_data:
    name: dopemux_staging_prometheus_data
  grafana_staging_data:
    name: dopemux_staging_grafana_data
