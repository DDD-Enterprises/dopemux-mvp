version: '3.9'

name: dopemux-dev

networks:
  dopemux-network:
    driver: bridge

volumes:
  pg_age_data:
  redis_data:
  qdrant_data:

services:
  # ========================================
  # INFRASTRUCTURE
  # ========================================

  # PostgreSQL with AGE extension
  postgres:
    image: apache/age:release_PG16_1.6.0
    container_name: dopemux-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dopemux_age
      POSTGRES_PASSWORD: dopemux_age_dev_password
      POSTGRES_DB: dopemux_knowledge_graph
    volumes:
      - pg_age_data:/var/lib/postgresql/data
      - ./docker/postgres/01-init-age.sql:/docker-entrypoint-initdb.d/01-init-age.sql
    ports:
      - "5432:5432"
    networks:
      - dopemux-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dopemux_age -d dopemux_knowledge_graph || exit 1"]
      timeout: 5s
      retries: 10
      interval: 10s
      start_period: 20s

  # Redis - Events and caching
  redis:
    image: redis:7-alpine
    container_name: dopemux-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - dopemux-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Qdrant - Vector database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: dopemux-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - dopemux-network
    environment:
      QDRANT_API_KEY: ${QDRANT_API_KEY:-dev-key}

  # ========================================
  # BACKEND SERVICES
  # ========================================

  # Backend API (Python)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dopemux-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://dopemux_age:dopemux_age_dev_password@postgres:5432/dopemux_knowledge_graph
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    volumes:
      # Hot reload for development
      - ./src:/app/src
      - ./config:/app/config
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - dopemux-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ========================================
  # FRONTEND
  # ========================================

  # Frontend (Next.js)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: dopemux-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NODE_ENV: development
    volumes:
      # Hot reload for Next.js development
      - ./pages:/app/pages
      - ./components:/app/components
      - ./src:/app/src
      - ./public:/app/public
      - ./styles:/app/styles
    depends_on:
      - backend
    networks:
      - dopemux-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ========================================
  # OPTIONAL: Development Tools
  # ========================================

  # Redis UI (optional)
  redis-ui:
    image: redislabs/redisinsight:latest
    container_name: dopemux-redis-ui
    restart: unless-stopped
    ports:
      - "8001:5540"
    depends_on:
      - redis
    networks:
      - dopemux-network
