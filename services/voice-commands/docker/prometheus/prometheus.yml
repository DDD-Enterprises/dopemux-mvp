global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'mcp-services'
    static_configs:
      - targets:
          - 'mcp-context7:3002'
          - 'mcp-zen:3003'
          - 'mcp-conport:3004'
          - 'mcp-serena:3006'
          - 'mcp-dope-context:3010'
          - 'mcp-desktop-commander:3012'
          - 'mcp-exa:3008'
          - 'mcp-gptr-mcp:3009'
          - 'mcp-leantime-bridge:3015'
          - 'dopemux-adhd-engine:8095'
          - 'dopemux-activity-capture:8096'
    metrics_path: '/metrics'
    scrape_interval: 30s

  - job_name: 'dopemux-services'
    static_configs:
      - targets:
          - 'dopemux-redis-primary:6379'
          - 'dopemux-postgres-age:5432'
          - 'mcp-qdrant:6333'
    scrape_interval: 60s

  - job_name: 'grafana'
    static_configs:
      - targets: ['dopemux-grafana:3000']

  - job_name: 'adhd-engine-health'
    static_configs:
      - targets: ['dopemux-adhd-engine:8095']
    metrics_path: '/health'
    scrape_interval: 60s
    params:
      format: ['prometheus']