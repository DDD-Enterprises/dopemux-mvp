# Dopemux ADHD Services - Complete Docker Orchestration
# ADHD Accommodation Engine and supporting services

services:
  # === REDIS (Shared Cache & Events) ===

  redis-primary:
    image: redis:7-alpine
    container_name: dopemux-redis-primary
    restart: unless-stopped
    networks:
      - dopemux-network
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 30s
    labels:
      - "service.role=cache"
      - "service.type=redis"

  # === ADHD ACCOMMODATION ENGINE ===

  adhd-engine:
    build:
      context: ../../services/adhd_engine
      dockerfile: Dockerfile
    container_name: dopemux-adhd-engine
    restart: unless-stopped
    networks:
      - dopemux-network
    environment:
      - API_PORT=8095
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8097,http://adhd-dashboard:8097
      - ADHD_ENGINE_API_KEY=${ADHD_ENGINE_API_KEY:-dev-key-123}
      - REDIS_URL=redis://redis-primary:6379
      - LOG_LEVEL=INFO
    ports:
      - "8095:8095"
    depends_on:
      redis-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8095/health || exit 1"]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 30s
    labels:
      - "service.role=adhd-core"
      - "service.type=engine"
      - "service.health=/health"

  # === ACTIVITY CAPTURE SERVICE ===

  activity-capture:
    build:
      context: ../../services/activity-capture
      dockerfile: Dockerfile
    container_name: dopemux-activity-capture
    restart: unless-stopped
    networks:
      - dopemux-network
    environment:
      - REDIS_URL=redis://redis-primary:6379
      - STREAM_NAME=dopemux:events
      - CONSUMER_GROUP=activity-capture
      - CONSUMER_NAME=activity-capture-1
      - ADHD_ENGINE_URL=http://adhd-engine:8095
      - ADHD_USER_ID=${ADHD_USER_ID:-default}
      - AGGREGATION_WINDOW_SECONDS=300
      - API_PORT=8096
    ports:
      - "8096:8096"
    depends_on:
      adhd-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8096/health || exit 1"]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 30s
    labels:
      - "service.role=adhd-support"
      - "service.type=activity-tracking"
      - "service.health=/health"

  # === BREAK SUGGESTER SERVICE ===

  break-suggester:
    build:
      context: ../../services/break-suggester
      dockerfile: Dockerfile
    container_name: dopemux-break-suggester
    restart: unless-stopped
    networks:
      - dopemux-network
    environment:
      - REDIS_URL=redis://redis-primary:6379
      - ADHD_ENGINE_URL=http://adhd-engine:8095
      - USER_ID=${ADHD_USER_ID:-default}
      - LOG_LEVEL=INFO
    # No exposed ports (EventBus consumer only)
    depends_on:
      adhd-engine:
        condition: service_healthy
    # Health check for background service
    healthcheck:
      test: ["CMD", "python", "-c", "import psutil; exit(0 if any('start_service.py' in cmd for cmd in [p.cmdline() for p in psutil.process_iter() if p.cmdline()]) else 1)"]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 30s
    labels:
      - "service.role=adhd-intervention"
      - "service.type=break-suggester"
      - "service.consumer=redis-streams"

  # === WORKSPACE WATCHER SERVICE ===

  workspace-watcher:
    build:
      context: ../../services/workspace-watcher
      dockerfile: Dockerfile
    container_name: dopemux-workspace-watcher
    restart: unless-stopped
    networks:
      - dopemux-network
    environment:
      - REDIS_URL=redis://redis-primary:6379
      - POLL_INTERVAL=5
      - CONFIG_PATH=/app/config.json
      - LOG_LEVEL=INFO
    # Needs host access for app detection
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - workspace_config:/app/config
    # No exposed ports (background monitoring)
    depends_on:
      redis-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import psutil; exit(0 if any('main.py' in cmd for cmd in [p.cmdline() for p in psutil.process_iter() if p.cmdline()]) else 1)"]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 30s
    labels:
      - "service.role=adhd-monitoring"
      - "service.type=workspace-watcher"
      - "service.consumer=system-events"

  # === ADHD DASHBOARD SERVICE ===

  adhd-dashboard:
    build:
      context: ../../services/adhd-dashboard
      dockerfile: Dockerfile
    container_name: dopemux-adhd-dashboard
    restart: unless-stopped
    networks:
      - dopemux-network
    environment:
      - DASHBOARD_API_KEY=${DASHBOARD_API_KEY:-dashboard-key-456}
      - ADHD_ENGINE_URL=http://adhd-engine:8095
      - REDIS_URL=redis://redis-primary:6379
      - API_PORT=8097
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8097
    ports:
      - "8097:8097"
    depends_on:
      adhd-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8097/health || exit 1"]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 30s
    labels:
      - "service.role=adhd-ui"
      - "service.type=dashboard"
      - "service.health=/health"

  # === ADHD NOTIFIER SERVICE ===

  adhd-notifier:
    build:
      context: ../../services/adhd-notifier
      dockerfile: Dockerfile
    container_name: dopemux-adhd-notifier
    restart: unless-stopped
    networks:
      - dopemux-network
    environment:
      - REDIS_URL=redis://redis-primary:6379
      - ADHD_ENGINE_URL=http://adhd-engine:8095
      - NOTIFICATION_METHODS=${NOTIFICATION_METHODS:-terminal,voice}
      - USER_ID=${ADHD_USER_ID:-default}
      - LOG_LEVEL=INFO
    # No exposed ports (notification service)
    depends_on:
      adhd-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import psutil; exit(0 if any('main.py' in cmd for cmd in [p.cmdline() for p in psutil.process_iter() if p.cmdline()]) else 1)"]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 30s
    labels:
      - "service.role=adhd-notification"
      - "service.type=notifier"
      - "service.consumer=redis-pubsub"

  # === COMPLEXITY COORDINATOR SERVICE ===

  complexity-coordinator:
    build:
      context: ../../services/complexity-coordinator
      dockerfile: Dockerfile
    container_name: dopemux-complexity-coordinator
    restart: unless-stopped
    networks:
      - dopemux-network
    environment:
      - REDIS_URL=redis://redis-primary:6379
      - ADHD_ENGINE_URL=http://adhd-engine:8095
      - COMPLEXITY_THRESHOLD=${COMPLEXITY_THRESHOLD:-0.6}
      - ANALYSIS_INTERVAL=${ANALYSIS_INTERVAL:-30}
      - LOG_LEVEL=INFO
    # No exposed ports (background analysis)
    depends_on:
      adhd-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import psutil; exit(0 if any('main.py' in cmd for cmd in [p.cmdline() for p in psutil.process_iter() if p.cmdline()]) else 1)"]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 30s
    labels:
      - "service.role=adhd-analysis"
      - "service.type=complexity-coordinator"
      - "service.consumer=code-events"

  # === CONTEXT SWITCH TRACKER SERVICE ===

  context-switch-tracker:
    build:
      context: ../../services/context-switch-tracker
      dockerfile: Dockerfile
    container_name: dopemux-context-switch-tracker
    restart: unless-stopped
    networks:
      - dopemux-network
    environment:
      - REDIS_URL=redis://redis-primary:6379
      - ADHD_ENGINE_URL=http://adhd-engine:8095
      - SWITCH_DETECTION_THRESHOLD=${SWITCH_DETECTION_THRESHOLD:-10}
      - CONTEXT_SAVE_ENABLED=${CONTEXT_SAVE_ENABLED:-true}
      - LOG_LEVEL=INFO
    # No exposed ports (background tracking)
    depends_on:
      adhd-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import psutil; exit(0 if any('main.py' in cmd for cmd in [p.cmdline() for p in psutil.process_iter() if p.cmdline()]) else 1)"]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 30s
    labels:
      - "service.role=adhd-tracking"
      - "service.type=context-switch-tracker"
      - "service.consumer=workspace-events"

  # === ENERGY TRENDS SERVICE ===

  energy-trends:
    build:
      context: ../../services/energy-trends
      dockerfile: Dockerfile
    container_name: dopemux-energy-trends
    restart: unless-stopped
    networks:
      - dopemux-network
    environment:
      - REDIS_URL=redis://redis-primary:6379
      - ADHD_ENGINE_URL=http://adhd-engine:8095
      - ANALYSIS_WINDOW_HOURS=${ANALYSIS_WINDOW_HOURS:-24}
      - PREDICTION_ENABLED=${PREDICTION_ENABLED:-true}
      - LOG_LEVEL=INFO
    # No exposed ports (background analysis)
    depends_on:
      adhd-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import psutil; exit(0 if any('main.py' in cmd for cmd in [p.cmdline() for p in psutil.process_iter() if p.cmdline()]) else 1)"]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 30s
    labels:
      - "service.role=adhd-analysis"
      - "service.type=energy-trends"
      - "service.consumer=energy-data"

# === NETWORKS ===

networks:
  dopemux-network:
    external: true

# === VOLUMES ===

volumes:
  redis_data:
    driver: local
  workspace_config:
    driver: local