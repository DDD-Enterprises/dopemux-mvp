name: Component 7 - CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'services/interruption-shield/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'services/interruption-shield/**'

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('services/interruption-shield/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      working-directory: services/interruption-shield
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests with coverage
      working-directory: services/interruption-shield
      run: |
        pytest --cov=interruption_shield --cov-report=xml --cov-report=term

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./services/interruption-shield/coverage.xml
        flags: interruption-shield
        name: codecov-interruption-shield

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      working-directory: services/interruption-shield
      run: |
        python -m pip install --upgrade pip
        pip install black flake8 mypy isort

    - name: Check formatting with black
      working-directory: services/interruption-shield
      run: black --check --diff .

    - name: Check import sorting with isort
      working-directory: services/interruption-shield
      run: isort --check --diff .

    - name: Lint with flake8
      working-directory: services/interruption-shield
      run: flake8 . --max-line-length=100 --extend-ignore=E203

    - name: Type check with mypy
      working-directory: services/interruption-shield
      run: mypy . --ignore-missing-imports

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install bandit
      run: pip install bandit

    - name: Run security scan
      working-directory: services/interruption-shield
      run: bandit -r . -ll -i

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [test, lint, security]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      working-directory: services/interruption-shield
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install build

    - name: Build package
      working-directory: services/interruption-shield
      run: python -m build

    - name: ✅ All checks passed
      run: echo "All CI checks passed successfully!"
