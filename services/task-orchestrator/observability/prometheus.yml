# Prometheus Configuration for Component 6
# ADHD Intelligence Layer Metrics Collection

global:
  scrape_interval: 15s  # Scrape targets every 15 seconds
  evaluation_interval: 15s  # Evaluate rules every 15 seconds

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['localhost:9093']

# Load rules once and periodically evaluate them
# rule_files:
#   - "adhd_alerts.yml"

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Task-Orchestrator metrics
  - job_name: 'task-orchestrator'
    static_configs:
      - targets: ['host.docker.internal:8000']  # Adjust port as needed
    metrics_path: '/metrics'
    scrape_interval: 10s  # Faster scraping for ADHD metrics

  # Pushgateway (for batch jobs)
  - job_name: 'pushgateway'
    honor_labels: true
    static_configs:
      - targets: ['pushgateway:9091']

# Optional: Remote write to long-term storage
# remote_write:
#   - url: "http://your-remote-storage:8428/api/v1/write"
