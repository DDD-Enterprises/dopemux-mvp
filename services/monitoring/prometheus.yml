global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: 'development'
    cluster: 'dopemux'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - '/etc/prometheus/alerting_rules.yml'

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Services will be added here as they're integrated
  # ADHD Engine
  - job_name: 'adhd-engine'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:8001']
        labels:
          service: 'adhd-engine'

  # ConPort
  - job_name: 'conport'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:3004']
        labels:
          service: 'conport'

  # Serena
  - job_name: 'serena'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:3001']
        labels:
          service: 'serena'

  # Orchestrator
  - job_name: 'orchestrator'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:8000']
        labels:
          service: 'orchestrator'

  # Dopecon Bridge
  - job_name: 'dopecon-bridge'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          service: 'dopecon-bridge'

  # Dope Context
  - job_name: 'dope-context'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:8005']
        labels:
          service: 'dope-context'
