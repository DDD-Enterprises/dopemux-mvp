# Prometheus Configuration for Dopemux Staging

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: 'staging'
    cluster: 'dopemux'

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # - alertmanager:9093  # Add when AlertManager deployed

# Load alerting rules
rule_files:
  - '/etc/prometheus/alerting_rules.yml'

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ConPort MCP Server
  - job_name: 'conport_mcp'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['conport-mcp:3004']
        labels:
          service: 'conport'
          layer: 'mcp'

  # Serena MCP Server
  - job_name: 'serena_mcp'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['serena-mcp:3001']
        labels:
          service: 'serena'
          layer: 'mcp'

  # ADHD Engine
  - job_name: 'adhd_engine'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['adhd-engine:8001']
        labels:
          service: 'adhd_engine'
          layer: 'cognitive'

  # Task Orchestrator
  - job_name: 'task_orchestrator'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['task-orchestrator:8000']
        labels:
          service: 'task_orchestrator'
          layer: 'orchestration'

  # PostgreSQL Exporter (optional, if added)
  # - job_name: 'postgresql'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']

  # Redis Exporter (optional, if added)
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']
