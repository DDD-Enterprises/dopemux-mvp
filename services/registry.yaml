# Dopemux Service Registry
# Single source of truth for ports, health endpoints, and service configuration
# 
# Schema:
#   name: string - canonical service name
#   port: integer - external host port
#   container_port: integer (optional) - internal container port (defaults to port)
#   health_path: string - health check endpoint path
#   health_method: string (optional) - HTTP method for health check (default: GET)
#   health_timeout_ms: integer (optional) - timeout in milliseconds (default: 5000)
#   health_expected_status: integer (optional) - expected HTTP status (default: 200)
#   compose_service_name: string (optional) - docker-compose service name (defaults to name)
#   enabled_in_smoke: boolean - whether service is included in smoke stack
#   category: string - service category (infrastructure, mcp, coordination, cognitive)
#   description: string - brief service description

version: "1.0"
last_updated: "2026-02-01"

services:
  # Infrastructure Services
  - name: postgres
    port: 5432
    container_port: 5432
    health_path: null  # Uses pg_isready command
    health_method: null
    health_timeout_ms: 5000
    compose_service_name: postgres
    enabled_in_smoke: true
    category: infrastructure
    description: "PostgreSQL database with AGE extension for knowledge graph"
    env_contract_exceptions:
      - variable: PORT
        reason: "PostgreSQL uses native POSTGRES_PORT configuration"
      - variable: LOG_LEVEL
        reason: "PostgreSQL logging configured via postgresql.conf"
      - variable: ENVIRONMENT
        reason: "Infrastructure service, not application code"
      - variable: SERVICE_NAME
        reason: "PostgreSQL is a third-party database system"
      - variable: HEALTH_CHECK_PATH
        reason: "Uses pg_isready command instead of HTTP endpoint"

  - name: redis
    port: 6379
    container_port: 6379
    health_path: null  # Uses redis-cli ping
    health_method: null
    health_timeout_ms: 3000
    compose_service_name: redis
    enabled_in_smoke: true
    category: infrastructure
    description: "Redis for caching and event streaming"
    env_contract_exceptions:
      - variable: PORT
        reason: "Redis uses native REDIS_PORT configuration"
      - variable: LOG_LEVEL
        reason: "Redis logging configured via redis.conf"
      - variable: ENVIRONMENT
        reason: "Infrastructure service, not application code"
      - variable: SERVICE_NAME
        reason: "Redis is a third-party cache system"
      - variable: HEALTH_CHECK_PATH
        reason: "Uses redis-cli ping instead of HTTP endpoint"

  - name: qdrant
    port: 6333
    container_port: 6333
    health_path: /  # Qdrant root endpoint
    health_method: GET
    health_timeout_ms: 5000
    health_expected_status: 200
    compose_service_name: qdrant
    enabled_in_smoke: true
    category: infrastructure
    description: "Qdrant vector database for semantic search"
    env_contract_exceptions:
      - variable: PORT
        reason: "Qdrant uses native QDRANT_PORT configuration"
      - variable: LOG_LEVEL
        reason: "Qdrant logging configured via config.yaml"
      - variable: ENVIRONMENT
        reason: "Infrastructure service, not application code"
      - variable: SERVICE_NAME
        reason: "Qdrant is a third-party vector database"
      - variable: HEALTH_CHECK_PATH
        reason: "Qdrant provides native HTTP health endpoint at /"

  # MCP Services
  - name: conport
    port: 3004
    container_port: 3004
    health_path: /health
    health_method: GET
    health_timeout_ms: 10000
    health_expected_status: 200
    compose_service_name: conport
    enabled_in_smoke: true
    category: mcp
    description: "ConPort - Knowledge graph and context management MCP server"
    env_contract_exceptions:
      - variable: MCP_SERVER_PORT
        reason: "ConPort uses PORT directly; MCP_SERVER_PORT is redundant"

  # Coordination Layer
  - name: dopecon-bridge
    port: 3016
    container_port: 3016
    health_path: /health
    health_method: GET
    health_timeout_ms: 5000
    health_expected_status: 200
    compose_service_name: dopecon-bridge
    enabled_in_smoke: true
    category: coordination
    description: "DopeconBridge - Central coordination and event routing layer"

  # Cognitive Services
  - name: task-orchestrator
    port: 8000
    container_port: 8000
    health_path: /health
    health_method: GET
    health_timeout_ms: 10000
    health_expected_status: 200
    compose_service_name: task-orchestrator
    enabled_in_smoke: true
    category: cognitive
    description: "Task Orchestrator - ADHD-aware task coordination service"
    env_contract_exceptions:
      - variable: DATABASE_URL
        reason: "Task Orchestrator is a wrapper service, delegates DB access to ConPort"

  - name: adhd-engine
    port: 8095
    container_port: 8095
    health_path: /health
    health_method: GET
    health_timeout_ms: 10000
    health_expected_status: 200
    compose_service_name: adhd-engine
    enabled_in_smoke: false  # Optional for minimal smoke stack
    category: cognitive
    description: "ADHD Engine (Serena) - Real-time ADHD accommodation service"
