# Dopemux Service Registry
# Single source of truth for ports, health endpoints, and service configuration
# 
# Schema:
#   name: string - canonical service name
#   port: integer - external host port
#   container_port: integer (optional) - internal container port (defaults to port)
#   health_path: string - health check endpoint path
#   health_method: string (optional) - HTTP method for health check (default: GET)
#   health_timeout_ms: integer (optional) - timeout in milliseconds (default: 5000)
#   health_expected_status: integer (optional) - expected HTTP status (default: 200)
#   compose_service_name: string (optional) - docker-compose service name (defaults to name)
#   enabled_in_smoke: boolean - whether service is included in smoke stack
#   category: string - service category (infrastructure, mcp, coordination, cognitive)
#   description: string - brief service description

version: "1.0"
last_updated: "2026-03-01"

services:
  # Infrastructure Services
  - name: postgres
    port: 5432
    container_port: 5432
    health_path: null  # Uses pg_isready command
    compose_service_name: postgres
    enabled_in_smoke: true
    category: infrastructure
    description: "PostgreSQL database with AGE extension for knowledge graph"

  - name: redis-events
    port: 6379
    container_port: 6379
    health_path: null  # Uses redis-cli ping
    compose_service_name: redis-events
    enabled_in_smoke: false
    category: infrastructure
    description: "Redis for event streaming"

  - name: redis-primary
    port: 6380
    container_port: 6379
    health_path: null
    compose_service_name: redis-primary
    enabled_in_smoke: false
    category: infrastructure
    description: "Redis for caching"

  - name: qdrant
    port: 6333
    container_port: 6333
    health_path: /
    compose_service_name: qdrant
    enabled_in_smoke: true
    category: infrastructure
    description: "Qdrant vector database"

  # Coordination Layer (Port Base + 0 and + 16)
  - name: dopecon-bridge
    port: 3016
    container_port: 3016
    health_path: /health
    compose_service_name: dopecon-bridge
    enabled_in_smoke: true
    category: coordination
    description: "DopeconBridge - Central coordination layer"

  - name: dopecon-bridge-alt
    port: 3000
    container_port: 3016
    health_path: /health
    compose_service_name: dopecon-bridge
    enabled_in_smoke: false
    category: coordination
    description: "DopeconBridge Alternate Port"

  # MCP Services (Port Base + 3 to + 15)
  - name: pal
    port: 3003
    container_port: 3003
    health_path: /health
    compose_service_name: pal
    enabled_in_smoke: false
    category: mcp
    description: "PAL MCP - Multi-model reasoning server"

  - name: conport-http
    port: 3004
    container_port: 3004
    health_path: /health
    compose_service_name: conport
    enabled_in_smoke: true
    category: mcp
    env_contract_exceptions:
      - variable: PORT
        reason: "ConPort smoke runtime binds via MCP_SERVER_PORT and service-specific startup scripts."
      - variable: LOG_LEVEL
        reason: "ConPort smoke runtime uses internal logging defaults instead of a unified LOG_LEVEL contract."
      - variable: ENVIRONMENT
        reason: "ConPort smoke runtime does not consume the shared ENVIRONMENT variable."
      - variable: HEALTH_CHECK_PATH
        reason: "ConPort health path is defined by the HTTP server implementation rather than loaded from env."
      - variable: SERVICE_NAME
        reason: "ConPort identifies itself through MCP/server metadata rather than the shared SERVICE_NAME env."
    description: "ConPort HTTP API"

  - name: conport-mcp
    port: 3005
    container_port: 3005
    health_path: /health
    compose_service_name: conport
    enabled_in_smoke: false
    category: mcp
    description: "ConPort MCP (SSE)"

  - name: serena
    port: 3006
    container_port: 3006
    health_path: /health
    compose_service_name: serena
    enabled_in_smoke: false
    category: mcp
    description: "Serena MCP - ADHD accommodation server"

  - name: gpt-researcher
    port: 3009
    container_port: 3009
    health_path: /health
    compose_service_name: gptr-mcp
    enabled_in_smoke: false
    category: mcp
    description: "GPT Researcher MCP"

  - name: dope-context
    port: 3010
    container_port: 3010
    health_path: /health
    compose_service_name: dope-context
    enabled_in_smoke: false
    category: mcp
    description: "Dope-Context MCP"

  - name: exa
    port: 3011
    container_port: 3011
    health_path: /health
    compose_service_name: exa
    enabled_in_smoke: false
    category: mcp
    description: "Exa Search MCP"

  - name: desktop-commander
    port: 3012
    container_port: 3012
    health_path: /health
    compose_service_name: desktop-commander
    enabled_in_smoke: false
    category: mcp
    description: "Desktop Commander MCP"

  - name: task-orchestrator
    port: 8000
    container_port: 8000
    health_path: /health
    compose_service_name: task-orchestrator
    enabled_in_smoke: true
    category: cognitive
    env_contract_exceptions:
      - variable: DATABASE_URL
        reason: "Task Orchestrator smoke runtime does not require a direct database connection in this stack."
    description: "Task Orchestrator (Multi-instance)"

  - name: leantime-bridge
    port: 3015
    container_port: 3015
    health_path: /health
    compose_service_name: leantime-bridge
    enabled_in_smoke: false
    category: coordination
    description: "Leantime Bridge MCP"

  # Temporal Services (Port Base + 20+)
  - name: dope-memory
    port: 3020
    container_port: 3020
    health_path: /health
    compose_service_name: dope-memory
    enabled_in_smoke: true
    category: mcp
    description: "Dope-Memory"

  - name: adhd-engine
    port: 3025
    container_port: 8095
    health_path: /health
    compose_service_name: adhd-engine
    enabled_in_smoke: false
    category: cognitive
    description: "ADHD Engine (Multi-instance)"

  # Shared Legacy/Static Services
  - name: leantime
    port: 8080
    container_port: 80
    health_path: /
    compose_service_name: leantime
    enabled_in_smoke: false
    category: coordination
    description: "Leantime PM application"

  - name: webhook-receiver
    port: 8790
    container_port: 8790
    health_path: /healthz
    compose_service_name: webhook-receiver
    enabled_in_smoke: false
    category: coordination
