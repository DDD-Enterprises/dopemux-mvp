# Minimal Profile
# Bare minimum for quick tasks and low-resource environments

name: minimal
display_name: "Minimal"
description: "Lightweight profile with only essential tools for quick tasks"

# MCP Server Selection (ConPort only)
mcps:
  - conport          # Memory and context (REQUIRED)

# ADHD Optimization
adhd_config:
  energy_preference: low
  attention_mode: any
  session_duration: 25

# Auto-Detection Rules
auto_detection:
  git_branches:
    - "quick/*"
    - "hotfix/*"
    - "chore/*"

  time_windows:
    - "08:00-09:00"    # Early morning quick tasks
    - "12:00-13:00"    # Lunch break quick tasks
    - "17:00-18:00"    # End of day cleanup
