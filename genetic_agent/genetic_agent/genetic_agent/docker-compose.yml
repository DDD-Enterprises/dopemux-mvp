version: '3.8'

services:
  genetic-agent:
    build: .
    ports:
      - "8000:8000"
    environment:
      - GENETIC_AGENT_ENV=production
      - PYTHONPATH=/app
      # MCP Service URLs - configure these for your environment
      - SERENA_URL=${SERENA_URL:-http://host.docker.internal:3001}
      - DOPE_CONTEXT_URL=${DOPE_CONTEXT_URL:-http://host.docker.internal:3002}
      - CONPORT_URL=${CONPORT_URL:-http://host.docker.internal:3003}
      - WORKSPACE_ID=${WORKSPACE_ID:-/app/workspace}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - genetic-network

  # Optional: Add monitoring stack
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - genetic-network
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - genetic-network
    profiles:
      - monitoring

  # Circuit breaker monitoring
  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=30
      - WATCHTOWER_INCLUDE_STOPPED=true
    networks:
      - genetic-network
    profiles:
      - monitoring

volumes:
  grafana_data:

networks:
  genetic-network:
    driver: bridge