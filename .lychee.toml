# Paths to exclude from link checking
exclude_path = [
  "docs/94-architecture/c4/",
  "docs/06-research/",
  "docs/archive/",
  "docs/04-explanation/archive/",
  "docs/04-explanation/implementation-plans/",
  "docs/04-explanation/technical-deep-dives/",
  "docs/05-audit-reports/",
  "docs/systems/",
  "docs/troubleshooting/",
  "docs/01-tutorials/",
  "docs/02-how-to/",
  "docs/03-reference/systems/dashboard/tmux-dashboard-readme.md",
  "docs/90-adr/ADR-207-LEANTIME-API-RESEARCH.md",
  "docs/WORKTREE_SWITCHING_GUIDE.md",
  "docs/CONTRIBUTING_ZEN.md",
  "README.md"
]

# Exclude localhost URLs (documentation examples, dev servers)
exclude = [
  "http://localhost:.*",
  "https://localhost:.*",
  "http://0.0.0.0:.*",
  "http://qdrant:.*",
  "https://www.researchgate.net/.*",
  "https://github.com/DDD-Enterprises/dopemux-mvp(\\.git|$|/.*)",
  "https://docs.dopemux.dev.*",
  "https://get.dopemux.dev.*",
  "https://dopemux.dev.*",
  "http://claude-mem.md/",
  "http://packet\\.md/.*",
  "http://[A-Za-z0-9._-]+\\.md/.*",
  "http://[A-Za-z0-9_-]+/.*"
]

# Accept 404s for localhost (fallback if regex doesn't catch all)
exclude_loopback = true

# Maximum concurrent requests
max_concurrency = 8

# Accept certain status codes that are acceptable
accept = [200, 201, 204, 429]
