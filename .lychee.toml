# Paths to exclude from link checking
exclude_path = ["docs/94-architecture/c4/"]

# Exclude localhost URLs (documentation examples, dev servers)
exclude = [
  "http://localhost:.*",
  "https://localhost:.*",
  "http://0\\.0\\.0\\.0:.*",
  "https://0\\.0\\.0\\.0:.*",
  "http://.*:6333.*",  # Qdrant
  "https://docs\\.dopemux\\.dev.*",  # Internal docs site (not yet deployed)
  ".*github\\.com/DDD-Enterprises/dopemux-mvp/issues/new.*",  # Issue creation links
  ".*github\\.com/DDD-Enterprises/dopemux-mvp/discussions/new.*",  # Discussion creation links
  ".*github\\.com/your-repo/.*",  # Placeholder repo links
  # External documentation that may be unavailable or relocated
  "https://docs\\.leantime\\.io/.*",
  "https://textual\\.textualize\\.io/guide/async/.*",
  "https://www\\.ably\\.io/blog/.*",
  "https://github\\.com/prometheus/client_python/tree/master/.*",
  "https://hogonext\\.com/.*",
  # External sites with paywalls or access restrictions
  "https://platform\\.openai\\.com/.*",
  "https://devops\\.com/.*",
  "https://medium\\.com/.*",
  "https://.*\\.medium\\.com/.*",
  "https://dl\\.acm\\.org/.*",
  "https://www\\.researchgate\\.net/.*",
  # Missing documentation files (to be created separately)
  "file://.*WORKTREE_SWITCHING_GUIDE.*",
  "file://.*phase-1[a-d]-.*",
  "file://.*phase-2-security-quality-complete.*",
  "file://.*phase-2a-security-scan.*",
  "file://.*phase-3-manual-review-findings.*"
]

# Accept 404s for localhost (fallback if regex doesn't catch all)
exclude_loopback = true

# Maximum concurrent requests
max_concurrency = 8

# Accept certain status codes that are acceptable
accept = [200, 201, 204, 429]
