# LEGACY - DO NOT USE
# This file is deprecated. Use compose.yml with -p dopemux.

# Dopemux Master Docker Compose - Complete Stack Orchestration
#
# This master compose file coordinates all Dopemux services:
# - MCP Servers (12 services)
# - Application Services (DopeconBridge, Task Orchestrator)
# - Infrastructure (PostgreSQL, Redis, Qdrant)
#
# Usage:
#   docker-compose -f docker-compose.master.yml up -d
#   docker-compose -f docker-compose.master.yml down
#   docker-compose -f docker-compose.master.yml ps
#
# Or use the convenience command:
#   dopemux mcp start-all

name: dopemux

version: '3.8'

networks:
  dopemux-network:
    external: true

volumes:
  pg_age_data:
  mcp_litellm_data:
  mcp_logs:
  mcp_cache:
  dope-decision-graph-qdrant-data:
  mcp_client_data:
  mcp_client_logs:


services:
  # ========================================
  # INFRASTRUCTURE SERVICES
  # ========================================

  # PostgreSQL with AGE (primary database)
  dopemux-postgres-age:
    image: postgres:16-alpine
    container_name: dopemux-postgres-age
    restart: unless-stopped
    networks:
      - dopemux-network
    environment:
      - POSTGRES_USER=dopemux_age
      - POSTGRES_PASSWORD=${AGE_PASSWORD:-dopemux_age_dev_password}
      - POSTGRES_DB=dopemux_knowledge_graph
    volumes:
      - pg_age_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U dopemux_age -d dopemux_knowledge_graph || exit 1" ]
      timeout: 5s
      retries: 10
      interval: 10s
      start_period: 20s

  # Redis Events (for EventBus streaming)
  dopemux-redis-events:
    image: redis:7-alpine
    container_name: dopemux-redis-events
    restart: unless-stopped
    networks:
      - dopemux-network
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 3

  # Redis Primary (for caching)
  dopemux-redis-primary:
    image: redis:7-alpine
    container_name: dopemux-redis-primary
    restart: unless-stopped
    networks:
      - dopemux-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 3

  # Redis UI (optional web interface)
  dopemux-redis-ui:
    image: redislabs/redisinsight:latest
    container_name: dopemux-redis-ui
    restart: unless-stopped
    networks:
      - dopemux-network
    ports:
      - "8081:8081"
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8081 || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Qdrant (vector database for embeddings)
  mcp-qdrant:
    image: qdrant/qdrant:latest
    container_name: mcp-qdrant
    restart: unless-stopped
    networks:
      - dopemux-network
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - dope-decision-graph-qdrant-data:/qdrant/storage

  # ========================================
  # MCP SERVERS (Core Intelligence)
  # ========================================

  # ConPort - Knowledge Graph & Context Management
  conport:
    build:
      context: ./docker/mcp-servers/conport
      dockerfile: Dockerfile
    container_name: mcp-conport
    restart: unless-stopped
    networks:
      - dopemux-network
    environment:
      - MCP_SERVER_PORT=3004
      - MCP_PROXY_PORT=3005
    ports:
      - "3004:3004"
      - "3005:3005"
    depends_on:
      - dopemux-postgres-age
      - dopemux-redis-primary
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:3004/health || exit 0" ]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 30s

  # Zen - Multi-Model Reasoning
  pal:
    build:
      context: ./docker/mcp-servers/pal
      dockerfile: Dockerfile
    container_name: mcp-pal
    restart: unless-stopped
    networks:
      - dopemux-network
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MCP_SERVER_PORT=3003
    ports:
      - "3003:3003"
    healthcheck:
      test: [ "CMD-SHELL", "exit 0" ]
      timeout: 10s
      retries: 3
      interval: 30s

  # LiteLLM - Model Router
  litellm:
    build:
      context: .
      dockerfile: docker/mcp-servers/litellm/Dockerfile
    container_name: mcp-litellm
    restart: unless-stopped
    networks:
      - dopemux-network
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - XAI_API_KEY=${XAI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATABASE_URL=${LITELLM_DATABASE_URL:-postgresql://dopemux_age:dopemux_age_dev_password@dopemux-postgres-age:5432/litellm}
    ports:
      - "4000:4000"
    depends_on:
      - dopemux-postgres-age
    healthcheck:
      test: [ "CMD-SHELL", "curl -f -H 'Authorization: Bearer <REDACTED_LITELLM_MASTER_KEY>' http://localhost:4000/health || exit 1" ]
      timeout: 10s
      retries: 3
      interval: 30s

  # GPT Researcher - Deep Research with Comprehensive Analysis
  gpt-researcher:
    build:
      context: ./docker/mcp-servers/gptr-mcp
      dockerfile: Dockerfile
    container_name: mcp-gptr-mcp
    restart: unless-stopped
    networks:
      - dopemux-network
    environment:
      - MCP_SERVER_PORT=3009
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - EXA_API_KEY=${EXA_API_KEY}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    ports:
      - "3009:3009"
    healthcheck:
      test: [ "CMD-SHELL", "pgrep -f 'python.*server.py' > /dev/null || exit 1" ]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 45s

  # Exa - Neural Web Search
  exa:
    build:
      context: ./docker/mcp-servers/exa
      dockerfile: Dockerfile
    container_name: mcp-exa
    restart: unless-stopped
    networks:
      - dopemux-network
    environment:
      - EXA_API_KEY=${EXA_API_KEY}
      - MCP_SERVER_PORT=3011
    ports:
      - "3011:3011"
    healthcheck:
      test: [ "CMD-SHELL", "pgrep -f python > /dev/null || exit 1" ]
      timeout: 10s
      retries: 3
      interval: 30s

  # Desktop Commander - Desktop Automation
  desktop-commander:
    build:
      context: ./docker/mcp-servers/desktop-commander
      dockerfile: Dockerfile
    container_name: mcp-desktop-commander
    restart: unless-stopped
    networks:
      - dopemux-network
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - MCP_SERVER_PORT=3012
    ports:
      - "3012:3012"
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
    healthcheck:
      test: [ "CMD-SHELL", "pgrep -f python > /dev/null || exit 1" ]
      timeout: 10s
      retries: 3
      interval: 30s

  # Serena v2 - Code Navigation and Analysis
  serena-v2:
    build:
      context: ./docker/mcp-servers/serena
      dockerfile: Dockerfile
    container_name: mcp-serena-v2
    restart: unless-stopped
    networks:
      - dopemux-network
    environment:
      - MCP_SERVER_PORT=3006
      - WORKSPACE_ID=${WORKSPACE_ID:-/workspace}
    ports:
      - "3006:3006"
    volumes:
      - ${DEFAULT_WORKSPACE_PATH:-/Users/hue/code/dopemux-mvp}:/workspace:ro
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:3006/health || exit 0" ]
      timeout: 10s
      retries: 3
      interval: 30s

  # Leantime Bridge - Project Management Integration
  leantime-bridge:
    build:
      context: ./docker/mcp-servers/leantime-bridge
      dockerfile: Dockerfile
    container_name: mcp-leantime-bridge
    restart: unless-stopped
    networks:
      - dopemux-network
    environment:
      - MCP_SERVER_PORT=3015
      - LEANTIME_API_TOKEN=${LEANTIME_API_TOKEN}
      - LEANTIME_URL=${LEANTIME_URL:-http://leantime:80}
    ports:
      - "3015:3015"
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:3015/health || exit 0" ]
      timeout: 10s
      retries: 3
      interval: 30s

  # Dope Context - Semantic Search and Autonomous Indexing
  dope-context:
    build:
      context: ./services/dope-context
      dockerfile: Dockerfile
    container_name: mcp-dope-context
    restart: unless-stopped
    networks:
      - dopemux-network
    environment:
      - MCP_SERVER_PORT=3010
      - VOYAGE_API_KEY=${VOYAGEAI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - QDRANT_URL=http://mcp-qdrant:6333
    ports:
      - "3010:3010"
    depends_on:
      - mcp-qdrant
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:3010/health || exit 0" ]
      timeout: 10s
      retries: 3
      interval: 30s

  # ========================================
  # APPLICATION SERVICES (Event System)
  # ========================================

  # DopeconBridge - Event Processing & Pattern Detection
  dopecon-bridge:
    build:
      context: ./services/dopecon-bridge
      dockerfile: Dockerfile
    container_name: dope-decision-graph-bridge
    restart: unless-stopped
    networks:
      - dopemux-network
    ports:
      - "3016:3016"
    environment:
      - PORT_BASE=3000
      - POSTGRES_URL=postgresql+asyncpg://dopemux_age:${AGE_PASSWORD:-dopemux_age_dev_password}@dopemux-postgres-age:5432/dopemux_knowledge_graph
      - QDRANT_URL=http://mcp-qdrant:6333
      - REDIS_URL=redis://dopemux-redis-events:6379
    depends_on:
      - dopemux-postgres-age
      - dopemux-redis-events
      - mcp-qdrant
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:3016/health || exit 1" ]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 30s
    labels:
      - "dopemux.service=application"
      - "dopemux.component=event-processing"
      - "dopemux.description=Event bus and pattern detection for ADHD intelligence"

  # Task Orchestrator - ADHD Task Coordination
  task-orchestrator:
    build:
      context: .
      dockerfile: services/task-orchestrator/Dockerfile
    container_name: dopemux-task-orchestrator
    command: python -m services.task-orchestrator.app.main
    restart: unless-stopped
    networks:
      - dopemux-network
    environment:
      - LEANTIME_URL=${LEANTIME_URL:-http://leantime:80}
      - LEANTIME_TOKEN=${LEANTIME_TOKEN}
      - REDIS_URL=redis://dopemux-redis-primary:6379
      - WORKSPACE_ID=/Users/hue/code/dopemux-mvp
      - CONPORT_URL=http://conport:3004
      - DOPECON_BRIDGE_URL=http://dopecon-bridge:3016
      - DOPECON_BRIDGE_SOURCE_PLANE=cognitive_plane
      - TASK_ORCHESTRATOR_API_KEY=${TASK_ORCHESTRATOR_API_KEY:-dev-key-456}
      - DOPECON_BRIDGE_REDIS_URL=redis://dopemux-redis-primary:6379
    depends_on:
      - dopemux-redis-primary
      - conport
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.task-orchestrator.rule=Host(`task-orchestrator.staging.local`)"
      - "traefik.http.services.task-orchestrator.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.task-orchestrator-healthcheck.healthcheck.path=/health"
      - "traefik.http.middlewares.task-orchestrator-healthcheck.healthcheck.interval=10s"
      - "traefik.http.middlewares.task-orchestrator-session.redis.endpoints=dopemux-redis-primary:6379"
      - "traefik.http.middlewares.task-orchestrator-session.redis.keyprefix=orchestrator_session"
      - "traefik.http.routers.task-orchestrator.middlewares=task-orchestrator-session@docker"
      - "dopemux.service=application"
      - "dopemux.component=task-coordination"
      - "dopemux.description=ADHD-optimized task orchestration and agent coordination"

  # ADHD Engine - Real-time ADHD Accommodation Service
  adhd-engine:
    build:
      context: .
      dockerfile: services/adhd_engine/Dockerfile
    container_name: dopemux-adhd-engine
    restart: unless-stopped
    networks:
      - dopemux-network
    environment:
      - API_PORT=8095
      - HOST=0.0.0.0
      - ADHD_ENGINE_API_KEY=${ADHD_ENGINE_API_KEY:-dev-key-123}
      - REDIS_URL=redis://dopemux-redis-primary:6379
      - CONPORT_URL=http://conport:3004
      - DOPECON_BRIDGE_URL=http://dopecon-bridge:3016
      - DOPECON_BRIDGE_SOURCE_PLANE=cognitive_plane
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8097,http://adhd-dashboard:8097
    depends_on:
      - dopemux-redis-primary
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.adhd-engine.rule=Host(`adhd-engine.staging.local`)"
      - "traefik.http.services.adhd-engine.loadbalancer.server.port=8095"
      - "traefik.http.middlewares.adhd-engine-healthcheck.healthcheck.path=/health"
      - "traefik.http.middlewares.adhd-engine-healthcheck.healthcheck.interval=10s"
      - "traefik.http.middlewares.adhd-engine-session.redis.endpoints=dopemux-redis-primary:6379"
      - "traefik.http.middlewares.adhd-engine-session.redis.keyprefix=adhd_session"
      - "traefik.http.routers.adhd-engine.middlewares=adhd-engine-session@docker"
      - "dopemux.service=application"
      - "dopemux.component=adhd-accommodation"
      - "dopemux.description=Real-time ADHD task assessment, energy monitoring, and accommodation recommendations"
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8095/health || exit 1" ]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 30s

  # Genetic Agent - AI Code Repair with Genetic Programming
  genetic-agent:
    build:
      context: ./services/genetic_agent
      dockerfile: Dockerfile
    container_name: dopemux-genetic-agent
    restart: unless-stopped
    networks:
      - dopemux-network
    ports:
      - "8000:8000"
    environment:
      - GENETIC_AGENT_PAL_URL=http://pal:3003
      - GENETIC_AGENT_CONPORT_URL=http://conport:3004
      - DOPECON_BRIDGE_URL=http://dopecon-bridge:3016
      - DOPECON_BRIDGE_SOURCE_PLANE=cognitive_plane
      - GENETIC_AGENT_SERENA_URL=http://serena:3005
      - GENETIC_AGENT_DOPE_CONTEXT_URL=http://dope-context:3006
      - GENETIC_AGENT_WORKSPACE_ID=/workspace
    depends_on:
      - pal
      - conport
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8000/health" ]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 30s
    labels:
      - "dopemux.service=application"
      - "dopemux.component=ai-code-repair"
      - "dopemux.description=Intelligent code repair using hybrid LLM + genetic programming approach"

  # Plane Coordinator - Two-Plane Architecture Coordination
  plane-coordinator:
    build:
      context: .
      dockerfile: services/task-orchestrator/Dockerfile.coordination
    container_name: dopemux-plane-coordinator
    restart: unless-stopped
    networks:
      - dopemux-network
    ports:
      - "8090:8090"
    environment:
      - COORDINATION_API_PORT=8090
      - WORKSPACE_ID=/workspace
      - REDIS_URL=redis://dopemux-redis-events:6379
      - CONPORT_URL=http://conport:3004
      - ADHD_ENGINE_URL=http://dopemux-adhd-engine:8095
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8097
    depends_on:
      - dopemux-redis-events
      - conport
      - adhd-engine
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8090/health || exit 1" ]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 30s
    labels:
      - "dopemux.service=application"
      - "dopemux.component=plane-coordination"
      - "dopemux.description=Two-plane architecture coordination between PM and Cognitive planes"

  # MCP Client - Custom client for stdio MCP servers
  mcp-client:
    build:
      context: ./services/mcp-client
      dockerfile: Dockerfile
    container_name: dopemux-mcp-client
    restart: unless-stopped
    networks:
      - dopemux-network
    environment:
      - OPENAI_API_KEY=<REDACTED_LITELLM_MASTER_KEY>
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - XAI_API_KEY=${XAI_API_KEY}
      - EXA_API_KEY=${EXA_API_KEY}
    volumes:
      - mcp_client_data:/app/data
      - mcp_client_logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      - "dopemux.service=mcp"
      - "dopemux.component=client"
      - "dopemux.description=Custom MCP client for stdio server integration"

  # Activity Capture - Automatic development activity tracking for ADHD Engine
  activity-capture:
    build:
      context: ./services/activity-capture
      dockerfile: Dockerfile
    container_name: dopemux-activity-capture
    restart: unless-stopped
    networks:
      - dopemux-network
    environment:
      - REDIS_URL=redis://dopemux-redis-events:6379
      - STREAM_NAME=dopemux:events
      - CONSUMER_GROUP=activity-capture
      - CONSUMER_NAME=activity-capture-1
      - ADHD_ENGINE_URL=http://host.docker.internal:8095
      - ADHD_USER_ID=hue
      - AGGREGATION_WINDOW_SECONDS=300
      - API_PORT=8096
    ports:
      - "8096:8096"
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8096/health || exit 1" ]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 45s
    labels:
      - "dopemux.service=monitoring"
      - "dopemux.component=activity-capture"
      - "dopemux.description=Development activity tracking for ADHD Engine"
  # Note: All MCP servers are now consolidated in this master compose file.
