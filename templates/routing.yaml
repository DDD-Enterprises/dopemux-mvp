# Dopemux Global Routing Configuration
#
# This file defines the global LiteLLM routing strategy for all Dopemux instances
# on this macOS user account. It is managed by `dopemux routing` commands.
#
# DO NOT EDIT THIS FILE DIRECTLY unless you understand the full implications.
# Use `dopemux routing edit` to safely modify and validate changes.
#
# Changes require `dopemux routing reload` to take effect.

version: 1

# Routing mode: determines how Claude Code requests are handled
# - "subscription": Direct to Anthropic (no proxy, requires ANTHROPIC_API_KEY)
# - "api": Route through global LiteLLM proxy (requires LiteLLM services)
mode: subscription

# Port configuration for LiteLLM and CCR services
ports:
  litellm: 4000
  ccr: 4010

# Provider definitions - API keys are NOT stored here
# Keys must be in ~/.dopemux/routing.env
providers:
  - name: xai
    label: "xAI Grok"
    api_key_env: "XAI_API_KEY"
    base_url: "https://api.x.ai/v1"
    
  - name: openrouter
    label: "OpenRouter"
    api_key_env: "OPENROUTER_API_KEY"
    base_url: "https://openrouter.ai/api/v1"
    extra_headers:
      HTTP-Referer: "https://dopemux.local"
      X-Title: "Dopemux LiteLLM Proxy"

# Model definitions - reference providers by name
models:
  # GEMINI (direct)
  - name: gemini-2.5-flash-lite
    provider: gemini
    litellm_model: "gemini/gemini-2.5-flash-lite"
    params:
      thinking: { type: "disabled", budget_tokens: 0 }

  - name: gemini-2.5-flash
    provider: gemini
    litellm_model: "gemini/gemini-2.5-flash"
    params:
      thinking: { type: "disabled", budget_tokens: 0 }

  - name: gemini-2.5-pro
    provider: gemini
    litellm_model: "gemini/gemini-2.5-pro"
    params:
      thinking: { type: "enabled", budget_tokens: 1024 }

  # XAI (direct)
  - name: grok-4.1-fast-reasoning
    provider: xai
    litellm_model: "xai/grok-4-1-fast-reasoning"

  - name: grok-4.1-fast
    provider: xai
    litellm_model: "xai/grok-4-1-fast-non-reasoning"

  - name: grok-4-fast-reasoning
    provider: xai
    litellm_model: "xai/grok-4-fast-reasoning"

  - name: grok-4-fast
    provider: xai
    litellm_model: "xai/grok-4-fast-non-reasoning"

  - name: grok-code-fast-1
    provider: xai
    litellm_model: "xai/grok-code-fast-1"

  # OPENAI (direct)
  - name: gpt-5.2
    provider: openai
    litellm_model: "openai/gpt-5.2"

  - name: gpt-5.2-codex
    provider: openai
    litellm_model: "openai/gpt-5.2-codex"

  - name: gpt-5-mini
    provider: openai
    litellm_model: "openai/gpt-5-mini"

  - name: gpt-5-nano
    provider: openai
    litellm_model: "openai/gpt-5-nano"

# Slot definitions - assign models to usage slots
# These are exposed to Claude Code via CCR
slots:
  default: gemini-2.5-flash-lite
  bulk: gemini-2.5-flash-lite
  format: grok-4.1-fast
  think: grok-4.1-fast-reasoning
  background: gemini-2.5-flash-lite
  longContext: grok-4.1-fast
  arbiter: gpt-5.2
  codex: grok-code-fast-1
  opus: gpt-5.2-codex
  sonnet: grok-4.1-fast-reasoning
  haiku: gemini-2.5-flash-lite

# Fallback chain for resilience
fallbacks:
  gemini-2.5-flash-lite:
    - grok-4.1-fast
    - grok-4.1-fast-reasoning
    - gpt-5.2
  gemini-2.5-flash:
    - grok-4.1-fast
    - grok-4.1-fast-reasoning
    - gpt-5.2
  grok-4.1-fast:
    - grok-4.1-fast-reasoning
    - gpt-5.2
  grok-4.1-fast-reasoning:
    - gpt-5.2

# Default fallback list (ordered)
default_fallbacks:
  - grok-4.1-fast
  - gpt-5.2

# Model alias map for compatibility
# Maps common model names to Dopemux slot names
aliases:
  grok-4: default
  grok: default
  grok-code: codex
  claude-sonnet: sonnet
  claude-sonnet-4-5-20250929: sonnet
  claude-sonnet-4.5: sonnet
  claude-sonnet-4: sonnet
  claude-haiku: haiku
  claude-opus: opus
  claude-opus-4-1-20250805: opus
  claude-opus-4-20250514: opus
  claude-opus-4: opus
  claude-4: sonnet
  claude-4-sonnet: sonnet
  claude-4-opus: opus
  claude-3.7: sonnet
  claude-3-7-sonnet-20250219: sonnet
  claude-3.5: sonnet
  claude-3-5-sonnet-20240620: sonnet
  claude-3-5-sonnet-20241022: sonnet
  anthropic/claude-3-5-sonnet-latest: sonnet
  xai/grok-code-fast: codex
  gpt-5: sonnet
  codex: codex
