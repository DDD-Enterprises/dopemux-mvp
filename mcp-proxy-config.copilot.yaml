mcpServers:
  conport:
    type: stdio
    command: docker
    args:
      - exec
      - -i
      - mcp-conport_main
      - uvx
      - --from
      - context-portal-mcp
      - conport-mcp
    env:
      DOPEMUX_INSTANCE_ID: "main"
      DOPEMUX_WORKSPACE_ID: "/Users/hue/code/dopemux-mvp"
  gpt-researcher_wrapped:
    type: stdio
    command: python
    args:
      - /Users/hue/code/dopemux-mvp/scripts/mcp_event_wrapper.py
      - --server
      - gpt-researcher
      - --instance
      - "${DOPEMUX_INSTANCE_ID:-A}"
      - --redis-host
      - localhost
      - --redis-port
      - "6379"
    env:
      WORKSPACE_PATH: "/Users/hue/code/dopemux-mvp"
      EXA_API_KEY: "${EXA_API_KEY}"
      TAVILY_API_KEY: "${TAVILY_API_KEY}"
      PERPLEXITY_API_KEY: "${PERPLEXITY_API_KEY}"
      DEBUG: "false"
      DOPEMUX_INSTANCE_ID: "${DOPEMUX_INSTANCE_ID:-A}"
  serena:
    type: stdio
    command: uvx
    args:
      - mcp-proxy
      - --transport
      - streamablehttp
      - http://127.0.0.1:3006/sse
    env: {}
  dope-context:
    type: stdio
    command: bash
    args:
      - services/dope-context/run_mcp.sh
    env: {}
  mas-sequential-thinking:
    type: stdio
    command: docker
    args:
      - exec
      - mcp-mas-sequential-thinking
      - mcp-server-mas-sequential-thinking
    env: {}
  pal:
    type: stdio
    command: uvx
    args:
      - --from
      - git+https://github.com/BeehiveInnovations/pal-mcp-server.git
      - pal-mcp-server
    env:
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY}"
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
      XAI_API_KEY: "${XAI_API_KEY}"
      DISABLED_TOOLS: "refactor,testgen,secaudit,docgen,tracer"
      DEFAULT_MODEL: "auto"
      PAL_DEFAULT_PROVIDER: "openrouter"
  gpt-researcher:
    type: stdio
    command: python
    args:
      - /Users/hue/code/dopemux-mvp/scripts/gpt-researcher/mcp_server.py
    env:
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      TAVILY_API_KEY: "${TAVILY_API_KEY}"
      VOYAGEAI_API_KEY: "${VOYAGEAI_API_KEY}"
      EXA_API_KEY: "${EXA_API_KEY}"
  conport-admin:
    type: stdio
    command: docker
    args:
      - exec
      - -i
      - mcp-conport_main
      - python
      - /app/conport_mcp_stdio.py
    env:
      CONPORT_URL: "http://localhost:3004"
  exa:
    type: stdio
    command: uvx
    args:
      - mcp-proxy
      - --transport
      - streamablehttp
      - http://127.0.0.1:3007/sse
    env: {}
  task-orchestrator:
    type: stdio
    command: python
    args:
      - services/task-orchestrator/server.py
    env: {}
