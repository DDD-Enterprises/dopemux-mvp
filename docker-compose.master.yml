# ⚠️ DEPRECATED - Use compose.yml instead
# This file is kept for reference only. The canonical compose file is now compose.yml at repo root.
# See: compose.yml
#
# Dopemux Master Docker Compose - Complete Stack Orchestration
#
# This master compose file coordinates all Dopemux services:
# - MCP Servers (12 services)
# - Application Services (DopeconBridge, Task Orchestrator)
# - Infrastructure (PostgreSQL, Redis, Qdrant)
#
# Usage:
#   docker-compose -f docker-compose.master.yml up -d
#   docker-compose -f docker-compose.master.yml down
#   docker-compose -f docker-compose.master.yml ps
#
# Or use the convenience command:
#   dopemux mcp start-all

version: '3.8'

networks:
  dopemux-network:
    external: true
    name: dopemux-network

volumes:
  pg_age_data:
  mcp_pal_cache:
  mcp_litellm_data:
  mcp_logs:
  mcp_cache:
  dope-decision-graph-qdrant-data:


services:
  # ========================================
  # INFRASTRUCTURE SERVICES
  # ========================================

  # PostgreSQL with AGE (primary database)
  postgres:
    image: apache/age:release_PG16_1.6.0
    container_name: dopemux-postgres-age
    restart: unless-stopped
    networks:
      - dopemux-network
      
    environment:
      - POSTGRES_USER=dopemux_age
      - POSTGRES_PASSWORD=${AGE_PASSWORD:-dopemux_age_dev_password}
      - POSTGRES_DB=dopemux_knowledge_graph
    volumes:
      - pg_age_data:/var/lib/postgresql/data
      - ./docker/postgres/01-init-age.sql:/docker-entrypoint-initdb.d/01-init-age.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U dopemux_age -d dopemux_knowledge_graph || exit 1" ]
      timeout: 5s
      retries: 10
      interval: 10s
      start_period: 20s

  # Redis Events (for EventBus streaming)
  redis-events:
    image: redis:7-alpine
    container_name: redis-events
    restart: unless-stopped
    networks:
      - dopemux-network
      
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 3

  # Redis Primary (for caching)
  redis-primary:
    image: redis:7-alpine
    container_name: redis-primary
    restart: unless-stopped
    networks:
      - dopemux-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 3

  # Redis UI (optional web interface)
  redis-ui:
    image: redislabs/redisinsight:latest
    container_name: dopemux-redis-ui
    restart: unless-stopped
    networks:
      - dopemux-network
    ports:
      - "8081:5540"
    # Note: RedisInsight healthcheck disabled - app takes time to start and doesn't respond reliably to health checks

  # Qdrant (vector database for embeddings)
  mcp-qdrant:
    image: qdrant/qdrant:latest
    container_name: mcp-qdrant
    restart: unless-stopped
    networks:
      - dopemux-network
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - dope-decision-graph-qdrant-data:/qdrant/storage

  # ========================================
  # MCP SERVERS (Core Intelligence)
  # ========================================

  # ConPort - Knowledge Graph & Context Management
  conport:
    build:
      context: ./docker/mcp-servers/conport
      dockerfile: Dockerfile
    container_name: mcp-conport
    restart: unless-stopped
    networks:
      - dopemux-network
      
    environment:
      - MCP_SERVER_PORT=3004
      - DOPECON_BRIDGE_URL=http://dope-decision-graph-bridge:3016
      - DATABASE_URL=postgresql://dopemux_age:dopemux_age_dev_password@dopemux-postgres-age:5432/dopemux_knowledge_graph
      - POSTGRES_URL=postgresql+asyncpg://dopemux_age:dopemux_age_dev_password@dopemux-postgres-age:5432/dopemux_knowledge_graph
      - AGE_HOST=dopemux-postgres-age
      - AGE_PORT=5432
      - AGE_PASSWORD=${AGE_PASSWORD:-dopemux_age_dev_password}
      - REDIS_URL=redis://redis-primary:6379
      - QDRANT_URL=http://mcp-qdrant:6333
    ports:
      - "3004:3004"
      - "4004:4004"  # Info server for service discovery
    depends_on:
      - postgres
      - redis-primary
      - mcp-qdrant
      - dopecon-bridge
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:3004/health || exit 0" ]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 30s

  # Zen - Multi-Model Reasoning
  pal:
    build:
      context: ./docker/mcp-servers/pal
      dockerfile: Dockerfile
    container_name: mcp-pal
    restart: unless-stopped
    networks:
      - dopemux-network
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MCP_SERVER_PORT=3003
    ports:
      - "3003:3003"
    healthcheck:
      test: [ "CMD-SHELL", "exit 0" ]
      timeout: 10s
      retries: 3
      interval: 30s

  # LiteLLM - Model Router
  litellm:
    build:
      context: .
      dockerfile: docker/mcp-servers/litellm/Dockerfile
    container_name: mcp-litellm
    restart: unless-stopped
    networks:
      - dopemux-network
      
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - XAI_API_KEY=${XAI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATABASE_URL=${LITELLM_DATABASE_URL:-postgresql://dopemux_age:dopemux_age_dev_password@dopemux-postgres-age:5432/litellm}
    ports:
      - "4000:4000"
    depends_on:
      - postgres
    healthcheck:
      test: [ "CMD-SHELL", "curl -f -H 'Authorization: Bearer HZy6cX-h1t5wPed3XJHRByCK3lde4Pu17zDA5mz-BvM' http://localhost:4000/health || exit 1" ]
      timeout: 10s
      retries: 3
      interval: 30s

  # Dope-Context - Semantic Code & Docs Search
  dope-context:
    build:
      context: ./services/dope-context
      dockerfile: Dockerfile
    container_name: mcp-dope-context
    restart: unless-stopped
    networks:
      - dopemux-network
      
    environment:
      - MCP_SERVER_PORT=3010
      - VOYAGE_API_KEY=${VOYAGE_API_KEY}
      - VOYAGEAI_API_KEY=${VOYAGE_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - QDRANT_URL=http://mcp-qdrant:6333
    ports:
      - "3010:3010"
    volumes:
      - ./services/dope-context/data:/app/data
      - ./services/dope-context/logs:/app/logs
    depends_on:
      - mcp-qdrant
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:3010/health || exit 0" ]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 45s

  # ========================================
  # APPLICATION SERVICES (Event System)
  # ========================================

  # DopeconBridge - Event Processing & Pattern Detection
  dopecon-bridge:
    build:
      context: ./services/dopecon-bridge
      dockerfile: Dockerfile
    container_name: dope-decision-graph-bridge
    restart: unless-stopped
    networks:
      - dopemux-network
      
    ports:
      - "3016:3016"
    environment:
      - PORT_BASE=3000
      - POSTGRES_URL=postgresql+asyncpg://dopemux_age:dopemux_age_dev_password@dopemux-postgres-age:5432/dopemux_knowledge_graph
      - AGE_HOST=dopemux-postgres-age
      - AGE_PORT=5432
      - AGE_PASSWORD=${AGE_PASSWORD:-dopemux_age_dev_password}
      - QDRANT_URL=http://mcp-qdrant:6333
      - REDIS_URL=redis://redis-events:6379
    depends_on:
      - postgres
      - redis-events
      - mcp-qdrant
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:3016/health || exit 1" ]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 30s
    labels:
      - "dopemux.service=application"
      - "dopemux.component=event-processing"
      - "dopemux.description=Event bus and pattern detection for ADHD intelligence"

  # Task Orchestrator - ADHD Task Coordination (Scaled to 2 replicas)
  task-orchestrator:
    build:
      context: ./services/task-orchestrator
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - dopemux-network
      
    environment:
      - LEANTIME_URL=${LEANTIME_URL:-http://leantime:80}
      - LEANTIME_TOKEN=${LEANTIME_TOKEN}
      - REDIS_URL=redis://redis-primary:6379
      - WORKSPACE_ID=/Users/hue/code/dopemux-mvp
      - CONPORT_URL=http://conport:3004
      - DOPECON_BRIDGE_URL=http://dopecon-bridge:3016
      - DOPECON_BRIDGE_SOURCE_PLANE=cognitive_plane
      - TASK_ORCHESTRATOR_API_KEY=${TASK_ORCHESTRATOR_API_KEY:-dev-key-456}
      - DOPECON_BRIDGE_REDIS_URL=redis://redis-primary:6379
    depends_on:
      - redis-primary
      - conport
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.task-orchestrator.rule=Host(`task-orchestrator.staging.local`)"
      - "traefik.http.services.task-orchestrator.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.task-orchestrator-healthcheck.healthcheck.path=/health"
      - "traefik.http.middlewares.task-orchestrator-healthcheck.healthcheck.interval=10s"
      - "traefik.http.middlewares.task-orchestrator-session.redis.endpoints=redis-primary:6379"
      - "traefik.http.middlewares.task-orchestrator-session.redis.keyprefix=orchestrator_session"
      - "traefik.http.routers.task-orchestrator.middlewares=task-orchestrator-session@docker"
      - "dopemux.service=application"
      - "dopemux.component=task-coordination"
      - "dopemux.description=ADHD-optimized task orchestration and agent coordination"

  # ADHD Engine - Real-time ADHD Accommodation Service
  adhd-engine:
    build:
      context: .
      dockerfile: services/adhd_engine/Dockerfile
    restart: unless-stopped
    networks:
      - dopemux-network
      
    environment:
      - API_PORT=8095
      - HOST=0.0.0.0
      - ADHD_ENGINE_API_KEY=${ADHD_ENGINE_API_KEY:-dev-key-123}
      - REDIS_URL=redis://redis-primary:6379
      - CONPORT_URL=http://conport:3004
      - DOPECON_BRIDGE_URL=http://dopecon-bridge:3016
      - DOPECON_BRIDGE_SOURCE_PLANE=cognitive_plane
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8097,http://adhd-dashboard:8097
    depends_on:
      - redis-primary
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.adhd-engine.rule=Host(`adhd-engine.staging.local`)"
      - "traefik.http.services.adhd-engine.loadbalancer.server.port=8095"
      - "traefik.http.middlewares.adhd-engine-healthcheck.healthcheck.path=/health"
      - "traefik.http.middlewares.adhd-engine-healthcheck.healthcheck.interval=10s"
      - "traefik.http.middlewares.adhd-engine-session.redis.endpoints=redis-primary:6379"
      - "traefik.http.middlewares.adhd-engine-session.redis.keyprefix=adhd_session"
      - "traefik.http.routers.adhd-engine.middlewares=adhd-engine-session@docker"
      - "dopemux.service=application"
      - "dopemux.component=adhd-accommodation"
      - "dopemux.description=Real-time ADHD task assessment, energy monitoring, and accommodation recommendations"
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8095/health || exit 1" ]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 30s

  # Genetic Agent - AI Code Repair with Genetic Programming
  genetic-agent:
    build:
      context: ./services/genetic_agent
      dockerfile: Dockerfile
    container_name: dopemux-genetic-agent
    restart: unless-stopped
    networks:
      - dopemux-network
      
    ports:
      - "8000:8000"
    environment:
      - GENETIC_AGENT_PAL_URL=http://pal:3003
      - GENETIC_AGENT_CONPORT_URL=http://conport:3004
      - DOPECON_BRIDGE_URL=http://dopecon-bridge:3016
      - DOPECON_BRIDGE_SOURCE_PLANE=cognitive_plane
      - GENETIC_AGENT_SERENA_URL=http://serena:3005
      - GENETIC_AGENT_DOPE_CONTEXT_URL=http://dope-context:3006
      - GENETIC_AGENT_WORKSPACE_ID=/workspace
    depends_on:
      - pal
      - conport
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8000/health" ]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 30s
    labels:
      - "dopemux.service=application"
      - "dopemux.component=ai-code-repair"
      - "dopemux.description=Intelligent code repair using hybrid LLM + genetic programming approach"

  # Plane Coordinator - DISABLED (missing source files)
  # plane-coordinator:
  #   build:
  #     context: ./services/task-orchestrator
  #     dockerfile: Dockerfile.coordination
  #   container_name: dopemux-plane-coordinator
  #   restart: unless-stopped
  #   networks:
  #     - dopemux-network
  #   ports:
  #     - "8090:8090"
  #   environment:
  #     - COORDINATION_API_PORT=8090
  #   depends_on:
  #     - redis-events
  #     - conport
  #     - adhd-engine

  # Serena v2 - ADHD Engine MCP
  serena:
    build:
      context: ./docker/mcp-servers/serena
      dockerfile: Dockerfile
    container_name: dopemux-mcp-serena
    restart: unless-stopped
    networks:
      - dopemux-network
    ports:
      - "3006:3006"
      - "4006:4006"
    environment:
      - MCP_SERVER_PORT=3006
      - HTTP_PORT=4006
      - WORKSPACE_ID=${WORKSPACE_ID:-/workspace}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4006/health || exit 1"]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 30s

  # GPT Researcher - Deep research MCP
  gptr-mcp:
    build:
      context: ./docker/mcp-servers/gptr-mcp
      dockerfile: Dockerfile
    container_name: dopemux-mcp-gptr-mcp
    restart: unless-stopped
    networks:
      - dopemux-network
    ports:
      - "3009:3009"
    environment:
      - MCP_SERVER_PORT=3009
      - LLM_BACKEND=openai
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3009/health || exit 1"]
      timeout: 10s
      retries: 3
      interval: 30s

  # Exa - Neural search MCP
  exa:
    build:
      context: ./docker/mcp-servers/exa
      dockerfile: Dockerfile
    container_name: dopemux-mcp-exa
    restart: unless-stopped
    networks:
      - dopemux-network
    ports:
      - "3008:3008"
    environment:
      - MCP_SERVER_PORT=3008
      - EXA_API_KEY=${EXA_API_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3008/health || exit 1"]
      timeout: 10s
      retries: 3
      interval: 30s

  # Desktop Commander - Desktop automation
  desktop-commander:
    build:
      context: ./docker/mcp-servers/desktop-commander
      dockerfile: Dockerfile
    container_name: dopemux-mcp-desktop-commander
    restart: unless-stopped
    networks:
      - dopemux-network
    ports:
      - "3012:3012"
    environment:
      - MCP_SERVER_PORT=3012
      - DISPLAY=${DISPLAY:-:0}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3012/health"]
      timeout: 10s
      retries: 3
      interval: 30s

  # Leantime Bridge - Project management integration
  leantime-bridge:
    build:
      context: ./docker/mcp-servers/leantime-bridge
      dockerfile: Dockerfile
    container_name: dopemux-mcp-leantime-bridge
    restart: unless-stopped
    networks:
      - dopemux-network
    ports:
      - "3015:3015"
    env_file:
      - ./docker/mcp-servers/leantime-bridge/.env
    environment:
      - MCP_SERVER_HOST=0.0.0.0
      - MCP_SERVER_PORT=3015
      - LEANTIME_API_URL=${LEANTIME_API_URL:-${LEANTIME_URL:-http://leantime:80}}
      - LEANTIME_API_TOKEN=${LEANTIME_API_TOKEN:-${LEANTIME_TOKEN:-}}
      - REDIS_URL=redis://redis-primary:6379
    depends_on:
      - mcp-qdrant
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3015/health"]
      timeout: 10s
      retries: 3
      interval: 30s

  # Note: Additional MCP servers (Serena, Exa, Desktop Commander, etc.)
  # can be added here following the same pattern. For brevity, only core
  # services are shown. See docker/mcp-servers/docker-compose.yml for
  # the complete list of available MCP servers.
