[pytest]
minversion = 7.0
addopts =
    -ra
    -q
    --strict-markers
    --strict-config
    --cov=dopemux.mcp.provision
    --cov=dopemux.mcp.instance_overlay
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-fail-under=80
    --cov-branch
testpaths = tests
pythonpath = src
asyncio_mode = auto
norecursedirs =
    .git
    .venv
    docker
    services
    installers
    scripts
    docs
    genetic_agent
    dashboard
    test_*.py.disabled
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    adhd: marks tests specific to ADHD features
    claude: marks tests specific to Claude Code integration
    config: marks tests specific to configuration management
    asyncio: marks tests that rely on asyncio event loop
    database: marks tests that require database connection
    performance: marks performance-related tests
filterwarnings =
    ignore::pytest.PytestUnraisableExceptionWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
