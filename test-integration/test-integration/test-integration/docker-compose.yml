version: '3.8'
services:
  task-orchestrator:
    image: ghcr.io/jpicklyk/task-orchestrator:latest
    ports:
      - "8082:8080"
    volumes:
      - ./data:/app/data
      - ../.claude:/project/.claude
    environment:
      - PORT=8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
