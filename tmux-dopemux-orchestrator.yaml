session_name: dopemux-orchestrator
windows:
  - window_name: orchestration
    layout: main-vertical
    options:
      main-pane-height: 60%
      status: on
      status-interval: 10  # Faster updates for better responsiveness
      status-left: "#[bg=#020617,fg=#7dfbf6,bold] [LIVE] DØPEMÜX #[default] #[fg=#f5f26d]⚡ #{session_name} [WS: #{@workspace}] "
      status-right: "#[bg=#020617,fg=#94fadb] #(./scripts/pm-status.sh) #[fg=#ff8bd1] [CONSENT CHECK? y/N] #[fg=#9b78ff]💧 Logged. Hydrate."
      status-style: "bg=#020617,fg=#94fadb"
      window-status-current-style: "bg=#041628,fg=#7dfbf6,bold"
      window-status-style: "bg=#020617,fg=#777777"
      pane-border-style: "fg=#1a0520"
      pane-active-border-style: "fg=#7dfbf6"
    panes:
      # Pane 0: Task Orchestrator + PM Overview (Primary)
      - shell_command:
          - watch -n 30 './scripts/pm-dashboard.sh orchestrator'
        focus: true
      # Pane 1: ConPort Memory Hub (Enhanced PM Dashboard)
      - shell_command:
          - watch -n 30 './scripts/pm-dashboard.sh conport'
      # Pane 2: Leantime Strategic PM (Optional)
      - shell_command:
          - watch -n 30 './scripts/pm-dashboard.sh leantime'
        start_directory: .
      # Pane 3: Playwright Validation (With PM Links)
      - shell_command:
          - watch -n 30 './scripts/pm-dashboard.sh validation'
        start_directory: .
      # Pane 4: Zen Reasoning (Background with PM Context)
      - shell_command:
          - watch -n 30 './scripts/pm-dashboard.sh zen'
        start_directory: .
      # Pane 5: ADHD Metrics Dashboard
      - shell_command:
          - watch -n 30 './scripts/pm-dashboard.sh adhd'
        start_directory: .
      # Pane 6: System Health Monitor
      - shell_command:
          - watch -n 30 './scripts/pm-dashboard.sh health'
        start_directory: .
