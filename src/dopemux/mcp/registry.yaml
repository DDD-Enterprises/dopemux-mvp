# Canonical MCP registry for Dopemux.
# This file is the source of truth for MCP server naming and transport metadata.

servers:
  dopemux-conport:
    transport: http
    default_enabled: true
    required_for_auto: true
    docker:
      service: conport
      compose_file: compose.yml
      port: 3005
      health_url: http://localhost:3005/health
    local:
      command: uvx
      args:
        - --from
        - context-portal-mcp
        - conport-mcp

  dopemux-serena:
    transport: http
    default_enabled: true
    required_for_auto: true
    docker:
      service: serena
      compose_file: compose.yml
      port: 3006
      health_url: http://localhost:4006/health
    local:
      command: serena
      args:
        - start-mcp-server

  dopemux-desktop-commander:
    transport: http
    default_enabled: true
    required_for_auto: false
    docker:
      service: desktop-commander
      compose_file: compose.yml
      port: 3012
      health_url: http://localhost:3012/health

  dopemux-gpt-researcher:
    transport: http
    default_enabled: true
    required_for_auto: false
    docker:
      service: gptr-mcp
      compose_file: compose.yml
      port: 3009
      health_url: http://localhost:3009/health

  dopemux-leantime-bridge:
    transport: http-sse
    default_enabled: true
    required_for_auto: false
    docker:
      service: leantime-bridge
      compose_file: compose.yml
      port: 3015
      health_url: http://localhost:3015/health

  dopemux-dope-context:
    transport: http
    default_enabled: true
    required_for_auto: true
    docker:
      service: dope-context
      compose_file: compose.yml
      port: 3010
      health_url: http://localhost:3010/health

  dopemux-pal:
    transport: stdio
    default_enabled: false
    required_for_auto: false
    docker:
      service: pal
      compose_file: compose.yml
      port: 3003
    local:
      command: uvx
      args:
        - pal-mcp-server
        - start

  dopemux-exa:
    transport: http
    default_enabled: true
    required_for_auto: false
    docker:
      service: exa
      compose_file: compose.yml
      port: 3011
      health_url: http://localhost:3011/health
    local:
      command: npx
      args:
        - -y
        - exa-mcp

  dopemux-task-orchestrator:
    transport: http
    default_enabled: true
    required_for_auto: false
    docker:
      service: task-orchestrator
      compose_file: compose.yml
      port: 3014
      health_url: http://localhost:8000/health

  dopemux-adhd-engine:
    transport: http
    default_enabled: true
    required_for_auto: false
    docker:
      service: adhd-engine
      compose_file: compose.yml
      port: 3025
      health_url: http://localhost:8095/health

  dopemux-dopecon-bridge:
    transport: stdio
    default_enabled: true
    required_for_auto: false
    docker:
      service: dopecon-bridge
      compose_file: compose.yml
      exec:
        - python
        - /app/ddg_mcp_stdio.py
