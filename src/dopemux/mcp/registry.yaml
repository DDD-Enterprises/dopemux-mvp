# Canonical MCP registry for Dopemux.
# This file is the source of truth for MCP server naming and transport metadata.

servers:
  dopemux-conport:
    transport: http
    default_enabled: true
    required_for_auto: true
    docker:
      service: conport
      compose_file: compose.yml
      port: 3004
      health_url: http://localhost:3004/health
    local:
      command: uvx
      args:
        - --from
        - context-portal-mcp
        - conport-mcp

  dopemux-serena:
    transport: http
    default_enabled: true
    required_for_auto: true
    docker:
      service: serena
      compose_file: compose.yml
      port: 3006
      health_url: http://localhost:4006/health
    local:
      command: serena
      args:
        - start-mcp-server

  dopemux-desktop-commander:
    transport: http
    default_enabled: true
    required_for_auto: false
    docker:
      service: desktop-commander
      compose_file: compose.yml
      port: 3012
      health_url: http://localhost:3012/health

  dopemux-gpt-researcher:
    transport: http
    default_enabled: true
    required_for_auto: false
    docker:
      service: gptr-mcp
      compose_file: compose.yml
      port: 3009
      health_url: http://localhost:3009/health

  dopemux-leantime-bridge:
    transport: http-sse
    default_enabled: true
    required_for_auto: false
    docker:
      service: leantime-bridge
      compose_file: compose.yml
      port: 3015
      health_url: http://localhost:3015/health

  dopemux-claude-context:
    transport: http
    default_enabled: true
    required_for_auto: true
    docker:
      service: dope-context
      compose_file: compose.yml
      port: 3010
      health_url: http://localhost:3010/health
    local:
      command: npx
      args:
        - -y
        - "@zilliz/claude-context-mcp@latest"

  dopemux-dope-context:
    transport: http
    default_enabled: false
    required_for_auto: false
    docker:
      service: dope-context
      compose_file: compose.yml
      port: 3010
      health_url: http://localhost:3010/health

  dopemux-pal:
    transport: stdio
    default_enabled: false
    required_for_auto: false
    local:
      command: uvx
      args:
        - pal-mcp-server
        - start

  dopemux-zen:
    transport: stdio
    default_enabled: false
    required_for_auto: false
    local:
      command: npx
      args:
        - -y
        - zen-mcp

  dopemux-mas-sequential-thinking:
    transport: stdio
    default_enabled: false
    required_for_auto: false
    local:
      command: python
      args:
        - -m
        - mcp_server_mas_sequential_thinking

  dopemux-exa:
    transport: stdio
    default_enabled: false
    required_for_auto: false
    local:
      command: npx
      args:
        - -y
        - exa-mcp

  dopemux-morphllm-fast-apply:
    transport: stdio
    default_enabled: false
    required_for_auto: false
    local:
      command: npx
      args:
        - -y
        - morphllm-fast-apply-mcp
