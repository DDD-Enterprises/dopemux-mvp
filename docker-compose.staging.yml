version: '3.8'

# Staging Deployment Configuration for Dopemux
# Includes all services + monitoring (Prometheus + Grafana)

services:
  # =====================================================================
  # Data Layer
  # =====================================================================

  postgres-age:
    container_name: staging-dopemux-postgres-age
    image: apache/age:latest
    environment:
      POSTGRES_USER: dopemux_age
      POSTGRES_PASSWORD: dopemux_age_staging_password
      POSTGRES_DB: dopemux_knowledge_graph
    ports:
      - "15432:5432"  # Staging port (completely different range)
    volumes:
      - staging_postgres_data:/var/lib/postgresql/data
      - ./docker/mcp-servers/conport/migrations:/docker-entrypoint-initdb.d/migrations
    networks:
      - dopemux-staging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dopemux_age"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    container_name: staging-redis
    image: redis:7-alpine
    ports:
      - "16379:6379"  # Staging port (completely different range)
    volumes:
      - staging_redis_data:/data
    networks:
      - dopemux-staging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  qdrant:
    container_name: staging-qdrant
    image: qdrant/qdrant:latest
    ports:
      - "16333:6333"  # Staging port (completely different range)
    volumes:
      - staging_qdrant_data:/qdrant/storage
    networks:
      - dopemux-staging

  # =====================================================================
  # MCP Servers
  # =====================================================================

  conport-mcp:
    container_name: staging-conport-mcp
    build:
      context: ./docker/mcp-servers/conport
      dockerfile: Dockerfile
    environment:
      MCP_SERVER_PORT: 3004
      DATABASE_URL: postgresql://dopemux_age:dopemux_age_staging_password@postgres-age:5432/dopemux_knowledge_graph
      REDIS_URL: redis://redis:6379
      PYTHON_ENV: staging
    ports:
      - "13004:3004"  # Staging port (1xxxx range)
    depends_on:
      - postgres-age
      - redis
    networks:
      - dopemux-staging
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.conport.rule=Host(`conport.staging.local`)"
      - "traefik.http.services.conport.loadbalancer.server.port=3004"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  serena-mcp:
    container_name: staging-serena-mcp
    build:
      context: ./services/serena/v2
      dockerfile: Dockerfile
    environment:
      MCP_SERVER_PORT: 3001
      REDIS_URL: redis://redis:6379
      POSTGRES_URL: postgresql://dopemux_age:dopemux_age_staging_password@postgres-age:5432/dopemux_knowledge_graph
      PYTHON_ENV: staging
    ports:
      - "13001:3001"  # Staging port
    depends_on:
      - postgres-age
      - redis
    networks:
      - dopemux-staging
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.serena.rule=Host(`serena.staging.local`)"
      - "traefik.http.services.serena.loadbalancer.server.port=3001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # =====================================================================
  # Core Services
  # =====================================================================

  adhd-engine:
    container_name: staging-adhd-engine
    build:
      context: ./services/adhd_engine
      dockerfile: Dockerfile
    environment:
      PORT: 8001
      REDIS_URL: redis://redis:6379
      ENVIRONMENT: staging
    ports:
      - "18001:8001"  # Staging port
    depends_on:
      - redis
    networks:
      - dopemux-staging
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.adhd-engine.rule=Host(`adhd-engine.staging.local`)"
      - "traefik.http.services.adhd-engine.loadbalancer.server.port=8001"
      - "traefik.http.middlewares.adhd-engine-healthcheck.healthcheck.path=/health"
      - "traefik.http.middlewares.adhd-engine-healthcheck.healthcheck.interval=10s"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  task-orchestrator:
    container_name: staging-task-orchestrator
    build:
      context: ./services/task-orchestrator
      dockerfile: Dockerfile
    environment:
      PORT: 8002
      REDIS_URL: redis://redis:6379
      CONPORT_URL: http://conport-mcp:3004
      ENVIRONMENT: staging
    ports:
      - "18002:8002"  # Staging port
    depends_on:
      - conport-mcp
      - redis
    networks:
      - dopemux-staging
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.task-orchestrator.rule=Host(`task-orchestrator.staging.local`)"
      - "traefik.http.services.task-orchestrator.loadbalancer.server.port=8002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Additional scaled services for testing (Step 2: Scale to 10-15 services)
  adhd-engine-2:
    container_name: staging-adhd-engine-2
    build:
      context: ./services/adhd_engine
      dockerfile: Dockerfile
    environment:
      PORT: 8003
      REDIS_URL: redis://redis:6379
      ENVIRONMENT: staging
    ports:
      - "18003:8003"
    depends_on:
      - redis
    networks:
      - dopemux-staging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  conport-mcp-2:
    container_name: staging-conport-mcp-2
    build:
      context: ./docker/mcp-servers/conport
      dockerfile: Dockerfile
    environment:
      MCP_SERVER_PORT: 3005
      DATABASE_URL: postgresql://dopemux_age:dopemux_age_staging_password@postgres-age:5432/dopemux_knowledge_graph
      REDIS_URL: redis://redis:6379
      PYTHON_ENV: staging
    ports:
      - "13005:3005"
    depends_on:
      - postgres-age
      - redis
    networks:
      - dopemux-staging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  serena-mcp-2:
    container_name: staging-serena-mcp-2
    build:
      context: ./services/serena/v2
      dockerfile: Dockerfile
    environment:
      MCP_SERVER_PORT: 3002
      REDIS_URL: redis://redis:6379
      POSTGRES_URL: postgresql://dopemux_age:dopemux_age_staging_password@postgres-age:5432/dopemux_knowledge_graph
      PYTHON_ENV: staging
    ports:
      - "13002:3002"
    depends_on:
      - postgres-age
      - redis
    networks:
      - dopemux-staging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  task-orchestrator-2:
    container_name: staging-task-orchestrator-2
    build:
      context: ./services/task-orchestrator
      dockerfile: Dockerfile
    environment:
      PORT: 8004
      REDIS_URL: redis://redis:6379
      CONPORT_URL: http://conport-mcp:3004
      ENVIRONMENT: staging
    ports:
      - "18004:8004"
    depends_on:
      - conport-mcp
      - redis
    networks:
      - dopemux-staging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  break-suggester:
    container_name: staging-break-suggester
    build:
      context: ./services/break-suggester
      dockerfile: Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      USER_ID: staging_user
    depends_on:
      - redis
    networks:
      - dopemux-staging
    command: ["python", "start_service.py", "staging_user"]
    restart: unless-stopped

  # =====================================================================
  # Service Mesh & Monitoring Stack
  # =====================================================================

  traefik:
    container_name: staging-traefik
    image: traefik:v3.0
    ports:
      - "80:80"        # HTTP
      - "8082:8080"    # Dashboard (changed to avoid conflict)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--api.dashboard=true"
      - "--api.insecure=true"  # Enable for staging
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.staging.local`)"
      - "traefik.http.routers.traefik.service=api@internal"
    depends_on:
      - adhd-engine
      - conport-mcp
      - serena-mcp
    networks:
      - dopemux-staging

  prometheus:
    container_name: staging-prometheus
    image: prom/prometheus:latest
    ports:
      - "19090:9090"  # Staging port
    volumes:
      - ./services/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./services/monitoring/alerting_rules.yml:/etc/prometheus/alerting_rules.yml
      - staging_prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    depends_on:
      - conport-mcp
      - serena-mcp
      - adhd-engine
      - task-orchestrator
    networks:
      - dopemux-staging
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3

  grafana:
    container_name: staging-grafana
    image: grafana/grafana:latest
    ports:
      - "13000:3000"  # Staging port
    environment:
      GF_SECURITY_ADMIN_PASSWORD: staging_admin_password
      GF_INSTALL_PLUGINS: ""
    volumes:
      - staging_grafana_data:/var/lib/grafana
      - ./services/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./services/monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - dopemux-staging
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  staging_postgres_data:
  staging_redis_data:
  staging_qdrant_data:
  staging_prometheus_data:
  staging_grafana_data:

networks:
  dopemux-staging:
    driver: bridge
