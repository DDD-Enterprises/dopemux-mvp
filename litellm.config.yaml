  max_retries: 3
  drop_params: true
  model_alias_map:
    grok: openrouter-xai-grok-code-fast
    grok-code: openrouter-xai-grok-code-fast
    grok-code-fast-1: openrouter-xai-grok-code-fast
    grok-4: openrouter-xai-grok-4-fast
    grok-4-fast: openrouter-xai-grok-4-fast
    grok-4-fast-reasoning: grok-4-fast-reasoning
    grok-4-reasoning: grok-4-fast-reasoning
    openrouter-xai-grok-code-fast: openrouter-xai-grok-code-fast
    openrouter-xai-grok-4-fast: openrouter-xai-grok-4-fast
    openrouter-xai-grok-4-fast-reasoning: grok-4-fast-reasoning
    minimax: openrouter-openai-gpt-5-codex
    codex: openrouter-openai-gpt-5-codex
    gpt-5: openrouter-openai-gpt-5
    gpt-5-pro: openrouter-openai-gpt-5-pro
    gpt-5-codex: openrouter-openai-gpt-5-codex
    openrouter-openai-gpt-5: openrouter-openai-gpt-5
    openrouter-openai-gpt-5-pro: openrouter-openai-gpt-5-pro
    openrouter-openai-gpt-5-mini: openrouter-openai-gpt-5-mini
    openrouter-openai-gpt-5-codex: openrouter-openai-gpt-5-codex
    openrouter-google-gemini-2-flash: openrouter-google-gemini-2-flash
    openrouter-meta-llama-3.1-405b: openrouter-meta-llama-3.1-405b
    claude-sonnet: openrouter-xai-grok-code-fast
    claude-sonnet-4.5: openrouter-xai-grok-code-fast
    claude-sonnet-4-5-20250929: openrouter-xai-grok-code-fast
    claude-haiku: openrouter-xai-grok-code-fast
    claude-opus: openrouter-openai-gpt-5-codex
    claude-opus-4-20250514: openrouter-openai-gpt-5-codex
    claude-opus-4-1-20250805: openrouter-openai-gpt-5-codex
    claude-4: openrouter-openai-gpt-5-codex
    claude-4-sonnet: openrouter-xai-grok-code-fast
    claude-4-opus: openrouter-openai-gpt-5-codex
    claude-3.7: openrouter-xai-grok-code-fast
    claude-3-7-sonnet-20250219: openrouter-xai-grok-code-fast
    claude-3.5: openrouter-xai-grok-code-fast
    claude-3-5-sonnet-20240620: openrouter-xai-grok-code-fast
  fallbacks:
  - openrouter-openai-gpt-5-pro:
    - openrouter-openai-gpt-5-codex
    - openrouter-openai-gpt-5
  - openrouter-xai-grok-4-fast:
    - openrouter-openai-gpt-5-codex
    - openrouter-openai-gpt-5-pro
  - openrouter-xai-grok-code-fast:
    - openrouter-xai-grok-4-fast
    - openrouter-openai-gpt-5-codex
  - openrouter-openai-gpt-5:
    - openrouter-openai-gpt-5-codex
    - openrouter-openai-gpt-5-pro
  - openrouter-openai-gpt-5-codex:
    - openrouter-openai-gpt-5-pro
    - openrouter-xai-grok-4-fast
  - openrouter-openai-gpt-5-codex:
    - openrouter-openai-gpt-5
    - openrouter-xai-grok-4-fast
  default_fallbacks:
  - openrouter-xai-grok-4-fast
  - openrouter-openai-gpt-5
  - openrouter-openai-gpt-5-codex
general_settings:
  master_key: sk-master-dopemux-local-20251101
  # Use the in-network service name so LiteLLM can reach Postgres from inside Docker
  database_url: postgresql://dopemux_age:dopemux_age_dev_password@dopemux-postgres-age:5432/litellm
