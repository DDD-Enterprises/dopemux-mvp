model_list:
- model_name: grok-code-fast-1
  litellm_params:
    model: xai/grok-code-fast-1
    api_key: os.environ/XAI_API_KEY
    max_tokens: 131072
- model_name: grok-4-fast
  litellm_params:
    model: xai/grok-4-fast
    api_key: os.environ/XAI_API_KEY
    max_tokens: 131072
- model_name: grok-4-fast-reasoning
  litellm_params:
    model: xai/grok-4-fast-reasoning
    api_key: os.environ/XAI_API_KEY
    max_tokens: 131072
- model_name: gpt-5
  litellm_params:
    model: openrouter/openai/gpt-5
    api_key: os.environ/OPENROUTER_API_KEY
    api_base: https://openrouter.ai/api/v1
    max_tokens: 131072
    extra_headers:
      HTTP-Referer: https://dopemux.local
      X-Title: Dopemux LiteLLM Proxy
      Referer: https://dopemux.local
      User-Agent: Dopemux LiteLLM Proxy
- model_name: gpt-5-codex
  litellm_params:
    model: openrouter/openai/gpt-5-codex
    api_key: os.environ/OPENROUTER_API_KEY
    api_base: https://openrouter.ai/api/v1
    max_tokens: 131072
    extra_headers:
      HTTP-Referer: https://dopemux.local
      X-Title: Dopemux LiteLLM Proxy
      Referer: https://dopemux.local
      User-Agent: Dopemux LiteLLM Proxy
litellm_settings:
  timeout: 120
  max_retries: 3
  drop_params: true
  model_alias_map:
    grok: grok-code-fast-1
    grok-code: grok-code-fast-1
    grok-4: grok-4-fast
    grok-4-fast: grok-4-fast
    grok-4-fast-reasoning: grok-4-fast-reasoning
    grok-4-reasoning: grok-4-fast-reasoning
    minimax: gpt-5-codex
    codex: gpt-5-codex
    claude-sonnet: grok-code-fast-1
    claude-sonnet-4.5: grok-code-fast-1
    claude-sonnet-4-5-20250929: grok-code-fast-1
    claude-haiku: grok-code-fast-1
    claude-opus: gpt-5-codex
    claude-opus-4-20250514: gpt-5-codex
    claude-opus-4-1-20250805: gpt-5-codex
    claude-4: gpt-5-codex
    claude-4-sonnet: grok-code-fast-1
    claude-4-opus: gpt-5-codex
    claude-3.7: grok-code-fast-1
    claude-3-7-sonnet-20250219: grok-code-fast-1
    claude-3.5: grok-code-fast-1
    claude-3-5-sonnet-20240620: grok-code-fast-1
    gpt-5: gpt-5
  fallbacks:
  - grok-4-fast:
    - gpt-5
    - gpt-5-codex
  - grok-code-fast-1:
    - grok-4-fast
    - gpt-5-codex
  - gpt-5:
    - grok-4-fast
    - gpt-5-codex
  - gpt-5-codex:
    - gpt-5
    - grok-4-fast
  default_fallbacks:
  - grok-4-fast
  - gpt-5
  - gpt-5-codex
