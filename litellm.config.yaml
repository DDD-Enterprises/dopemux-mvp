litellm_settings:
  timeout: 90
  max_retries: 2
  drop_params: true
  model_alias_map:
    claude-sonnet-4.5: anthropic/claude-3.5-sonnet-20241022
    anthropic/claude-sonnet-4.5: anthropic/claude-3.5-sonnet-20241022
    claude-sonnet: anthropic/claude-3.5-sonnet-20241022
    anthropic/claude-sonnet-latest: anthropic/claude-3.5-sonnet-20241022
    claude-opus: o3
    anthropic/claude-opus-latest: o3
    claude-haiku: gpt-5-mini
    anthropic/claude-haiku-latest: gpt-5-mini
    gpt-5: gpt-5
    deepseek: deepseek-r1
    grok: grok-4-fast
    grok-code: grok-code-fast-1
router_settings:
  routing_strategy: simple-shuffle
  enable_pre_call_checks: true
  allowed_fails: 3
  cooldown_time: 45
  num_retries: 3
  retry_policy:
    TimeoutErrorRetries: 2
    RateLimitErrorRetries: 3
    AuthenticationErrorRetries: 1
    ContentPolicyViolationRetries: 1
  fallbacks:
  - claude-opus-4.1:
    - o3
    - gpt-5
  - claude-haiku-4.5:
    - gpt-5-mini
    - o3-mini
  - gpt-5:
    - o3
    - gpt-5-mini
  - o3:
    - gpt-5
    - claude-opus-4.1
  - deepseek-r1:
    - grok-4-fast
    - gpt-5-mini
  - grok-4-fast:
    - deepseek-r1
    - gpt-5
  - grok-code-fast-1:
    - claude-haiku-4.5
    - o4-mini
general_settings:
  master_key: [REDACTED]
