model_list:
- model_name: openai-gpt-5
  litellm_params:
    model: openai/gpt-5
    api_key: os.environ/OPENAI_API_KEY
    api_base: https://api.openai.com/v1
    temperature: 0.1
    max_tokens: 12288
- model_name: openai-gpt-5-mini
  litellm_params:
    model: openai/gpt-5-mini
    api_key: os.environ/OPENAI_API_KEY
    api_base: https://api.openai.com/v1
    temperature: 0.1
    max_tokens: 8192
- model_name: xai-grok-4
  litellm_params:
    model: xai/grok-4
    api_key: os.environ/XAI_API_KEY
    api_base: https://api.x.ai/v1
    temperature: 0.15
    max_tokens: 8192
- model_name: xai-grok-4-heavy
  litellm_params:
    model: xai/grok-4-heavy
    api_key: os.environ/XAI_API_KEY
    api_base: https://api.x.ai/v1
    temperature: 0.1
    max_tokens: 16384
litellm_settings:
  timeout: 90
  max_retries: 2
  fallbacks:
    openai-gpt-5:
    - openai-gpt-5-mini
    - xai-grok-4
    openai-gpt-5-mini:
    - xai-grok-4
    xai-grok-4:
    - xai-grok-4-heavy
    - openai-gpt-5-mini
    xai-grok-4-heavy:
    - xai-grok-4
    - openai-gpt-5
  default_fallbacks:
  - xai-grok-4
router_settings:
  routing_strategy: latency-based-routing
  enable_pre_call_checks: true
  allowed_fails: 3
  cooldown_time: 45
  retry_policy:
    TimeoutErrorRetries: 2
    RateLimitErrorRetries: 3
  content_policy_fallbacks:
    openai-gpt-5:
    - xai-grok-4
    openai-gpt-5-mini:
    - xai-grok-4
general_settings:
