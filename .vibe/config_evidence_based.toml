# Evidence-Based Vibe MCP Configuration
# Generated: 2026-02-23
# Based on actual runtime verification, not assumptions

active_model = "devstral-2"
textual_theme = "terminal"
vim_keybindings = false
disable_welcome_banner_animation = false
displayed_workdir = ""
auto_compact_threshold = 200000
context_warnings = true
auto_approve = false
system_prompt_id = "cli"
include_commit_signature = true
include_model_info = true
include_project_context = true
include_prompt_detail = false
enable_update_checks = true
enable_auto_update = true
api_timeout = 720.0
tool_paths = []
agent_paths = ["/Users/hue/.vibe/agents", "./.vibe/agents"]
skill_paths = ["/Users/hue/.vibe/skills", "./.vibe/skills"]
enabled_agents = ["tp-dev", "indexing"]
enabled_skills = []
disabled_skills = []

# MCP servers - EVIDENCE-BASED CONFIGURATION
# Verified endpoints and transports based on actual curl testing

# 1. PAL via Docker HTTP (already running, verified at http://localhost:3003/health)
# Uses standard MCP protocol - no need for local stdio instance
[[mcp_servers]]
name = "pal"
transport = "streamable-http"
url = "http://localhost:3003/mcp"
headers = { "Accept" = "application/json" }

# 2. Dope-Context (VERIFIED: list_tools works at /mcp)
# Transport: streamable-http
# Endpoint: http://localhost:3010/mcp
# Headers: Accept: application/json (not text/event-stream)
[[mcp_servers]]
name = "dope_context"
transport = "streamable-http"
url = "http://localhost:3010/mcp"
headers = { "Accept" = "application/json" }

# 3. Dope-Memory (VERIFIED: running at http://localhost:8096/health)
# NOTE: Dope-Memory does NOT use standard MCP endpoint
# It uses individual tool endpoints: /tools/memory_search, /tools/memory_store, etc.
# For Vibe integration, we need to use the individual endpoints or create an MCP wrapper
# Current status: Healthy but not standard MCP-compatible
# [[mcp_servers]]
# name = "dope_memory"
# transport = "streamable-http"
# url = "http://localhost:8096/mcp"  # This endpoint doesn't exist
# headers = { "Accept" = "application/json" }

# 4. Serena (VERIFIED: requires JSON-RPC format and session ID)
# Transport: streamable-http
# Endpoint: http://localhost:3006/mcp
# Headers: Accept: application/json (NOT text/event-stream)
# Requires: Proper JSON-RPC format with session ID
[[mcp_servers]]
name = "serena"
transport = "streamable-http"
url = "http://localhost:3006/mcp"
headers = { "Accept" = "application/json" }

# 5. ConPort (VERIFIED: custom response format, not standard MCP)
# Status: Responds at /mcp but returns custom format, not tool list
# Current behavior: Returns server status instead of tool list
# Requires: Investigation of actual MCP tool endpoint
# [[mcp_servers]]
# name = "conport"
# transport = "streamable-http"
# url = "http://localhost:3004/mcp"
# headers = { "Accept" = "application/json" }

enabled_tools = ["bash", "read_file", "write_file", "search_replace", "grep", "todo", "ask_user_question"]
disabled_tools = []

[[providers]]
name = "mistral"
api_base = "https://api.mistral.ai/v1"
api_key_env_var = "MISTRAL_API_KEY"
api_style = "openai"
backend = "mistral"
reasoning_field_name = "reasoning_content"

[[providers]]
name = "llamacpp"
api_base = "http://127.0.0.1:8080/v1"
api_key_env_var = ""
api_style = "openai"
backend = "generic"
reasoning_field_name = "reasoning_content"

[[models]]
name = "mistral-vibe-cli-latest"
provider = "mistral"
alias = "devstral-2"
temperature = 0.2
input_price = 0.4
output_price = 2.0

[[models]]
name = "devstral-small-latest"
provider = "mistral"
alias = "devstral-small"
temperature = 0.2
input_price = 0.1
output_price = 0.3

[[models]]
name = "devstral"
provider = "llamacpp"
alias = "local"
temperature = 0.2
input_price = 0.0
output_price = 0.0

[project_context]
max_chars = 40000
default_commit_count = 5
max_doc_bytes = 32768
truncation_buffer = 1000
max_depth = 3
max_files = 1000
max_dirs_per_level = 20
timeout_seconds = 2.0

[session_logging]
save_dir = "/Users/hue/.vibe/logs/session"
session_prefix = "session"
enabled = true

[tools.task]
permission = "ask"
allowlist = []
denylist = []

[tools.search_replace]
permission = "ask"
allowlist = []
denylist = []
max_content_size = 100000
create_backup = false
fuzzy_threshold = 0.9

[tools.bash]
permission = "ask"
allowlist = [
    "echo",
    "find",
    "git diff",
    "git log",
    "git status",
    "tree",
    "whoami",
    "cat",
    "file",
    "head",
    "ls",
    "pwd",
    "stat",
    "tail",
    "uname",
    "wc",
    "which",
    "curl",
    "uvx",
    "docker",
    "docker compose"
]
denylist = [
    "gdb",
    "pdb",
    "passwd",
    "nano",
    "vim",
    "vi",
    "emacs",
    "sh -i",
    "zsh -i",
    "fish -i",
    "dash -i",
    "screen",
    "tmux",
]
max_output_bytes = 16000
default_timeout = 300
denylist_standalone = [
    "python",
    "python3",
    "ipython",
    "bash",
    "sh",
    "nohup",
    "vi",
    "vim",
    "emacs",
    "nano",
    "su",
]

[tools.grep]
permission = "always"
allowlist = []
denylist = []
max_output_bytes = 64000
default_timeout = 60
exclude_patterns = [
    ".venv/",
    "venv/",
    ".env/",
    "env/",
    "node_modules/",
    ".git/",
    "__pycache__/",
    ".pytest_cache/",
    ".mypy_cache/",
    ".tox/",
    ".nox/",
    ".coverage/",
    "htmlcov/",
    "dist/",
    "build/",
    ".idea/",
    ".vscode/",
    "*.egg-info",
    "*.pyc",
    "*.pyo",
    "*.pyd",
    ".DS_Store",
    "Thumbs.db",
]
codeignore_file = ".vibeignore"

[tools.ask_user_question]
permission = "always"
allowlist = []
denylist = []

[tools.read_file]
permission = "always"
allowlist = []
denylist = []
max_read_bytes = 64000
max_state_history = 10

[tools.todo]
permission = "always"
allowlist = []
denylist = []
max_todos = 100

[tools.write_file]
permission = "ask"
allowlist = []
denylist = []
max_write_bytes = 64000
create_parent_dirs = true