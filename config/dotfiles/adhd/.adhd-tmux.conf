# ADHD Tmux Configuration Snippet
# Source this in your ~/.tmux.conf:
#   source-file ~/.adhd-tmux.conf
# Or copy lines to your existing config

# ───────────────────────────────────────────────────────────────
# Status Bar - ADHD State Display
# ───────────────────────────────────────────────────────────────

# Show ADHD state in right status (energy/attention icons)
set -g status-right '#(~/.dopemux/adhd-tmux-status.sh) | %H:%M'
set -g status-right-length 50

# Auto-refresh status every 30 seconds
set -g status-interval 30

# ───────────────────────────────────────────────────────────────
# ADHD-Friendly Colors
# ───────────────────────────────────────────────────────────────

# Status bar
set -g status-style 'bg=#1a1b26 fg=#7aa2f7'

# Active window - bright cyan (attention-grabbing but not harsh)
set -g window-status-current-style 'bg=#7dcfff fg=#1a1b26 bold'

# Inactive windows - dimmed
set -g window-status-style 'bg=default fg=#565f89'

# Pane borders - subtle until active
set -g pane-border-style 'fg=#3b4261'
set -g pane-active-border-style 'fg=#7dcfff'

# ───────────────────────────────────────────────────────────────
# ADHD Quick Access Bindings
# ───────────────────────────────────────────────────────────────

# Prefix + a = Show ADHD status popup
bind a display-popup -E -w 60 -h 20 "python3 ~/code/dopemux-mvp/services/adhd_engine/cli/adhd.py status"

# Prefix + A = Run all checks
bind A display-popup -E -w 60 -h 20 "python3 ~/code/dopemux-mvp/services/adhd_engine/cli/adhd.py check"

# Prefix + b = Take a break
bind b display-popup -E -w 40 -h 10 "python3 ~/code/dopemux-mvp/services/adhd_engine/cli/adhd.py break"

# Prefix + s = Save context (before switching)
bind s run-shell "python3 ~/code/dopemux-mvp/services/adhd_engine/cli/adhd.py context save"

# ───────────────────────────────────────────────────────────────
# ADHD-Optimized Window Management
# ───────────────────────────────────────────────────────────────

# Aggressive pane titles (helps with context)
set -g pane-border-status top
set -g pane-border-format " #{pane_index}: #{pane_title} "

# Window activity alerts (visual only, no sound)
set -g visual-activity on
set -g monitor-activity on

# Don't disturb with bells
set -g visual-bell off
set -g bell-action none

# ───────────────────────────────────────────────────────────────
# Session persistence (prevent losing context)
# ───────────────────────────────────────────────────────────────

# Enable tmux-resurrect if available
# set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @resurrect-capture-pane-contents 'on'
