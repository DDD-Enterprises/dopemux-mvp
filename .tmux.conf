# Dopemux PM Dashboard Keybindings
# Enhanced for ADHD-optimized PM workflow control

# Core PM Navigation (Prefix = Ctrl-b)
bind-key o run-shell "dopemux tmux send orchestration:0 'next_task'"  # Get next task from ConPort
bind-key m run-shell "dopemux tmux send orchestration:1 'log_decision'"  # Log decision in ConPort
bind-key v run-shell "dopemux tmux send orchestration:3 'validate_current_task'"  # Run Playwright validation
bind-key z run-shell "dopemux tmux send orchestration:5 'consensus_review'"  # Toggle Zen consensus

# PM Dashboard Controls
bind-key p run-shell "tmux split-window -h './scripts/pm-dashboard.sh overview'"  # Show PM overview pane
bind-key U run-shell "tmux split-window -h './scripts/pm-dashboard.sh unified'"  # Show Unified PM dashboard
bind-key P run-shell "tmux select-layout tiled"  # Rearrange panes for PM view
bind-key S run-shell "./scripts/pm-sync.sh"  # Trigger manual sync

# Pane Focus Shortcuts (Enhanced for PM)
bind-key O select-pane -t orchestration:0  # Focus Task Orchestrator (PM Hub)
bind-key M select-pane -t orchestration:1  # Focus ConPort Memory (PM Data)
bind-key V select-pane -t orchestration:3  # Focus Validation (PM Quality)
bind-key Z select-pane -t orchestration:5  # Focus Zen Reasoning (PM Analysis)

# Workflow Commands (PM-Enhanced)
bind-key T run-shell "dopemux tmux send orchestration:2 'sync_leantime'"  # Sync with Leantime strategic PM
bind-key R run-shell "dopemux tmux send orchestration:1 'reset_context'"  # Reset ConPort context
bind-key S run-shell "dopemux save-session && dopemux tmux send orchestration:1 'checkpoint'"  # Save session to ConPort

# PM Status & Health
bind-key H run-shell "dopemux health-check && ./scripts/pm-status.sh"  # Check all MCP services + PM status
bind-key L run-shell "dopemux tmux capture orchestration:1 --lines 20"  # Show recent ConPort activity

# ADHD-Optimized Controls
bind-key B run-shell "dopemux break-reminder"  # Trigger break reminder (ADHD Engine)
bind-key E run-shell "dopemux energy-check"  # Check current energy level
bind-key F run-shell "dopemux focus-mode-toggle"  # Toggle ADHD focus mode

# Dashboard Mode Controls
bind-key m run-shell "./scripts/pm-dashboard.sh cycle"  # Cycle dashboard modes (dev → pm → adhd → health → dev)
bind-key M command-prompt -p "Set dashboard mode (dev/pm/adhd/health):" "run-shell './scripts/pm-dashboard.sh mode %1'"  # Set specific mode

# Emergency Controls (PM-Aware)
bind-key X confirm-before "dopemux tmux send orchestration:5 'kill_session' && dopemux emergency-save"  # Kill Zen + save state
bind-key Q confirm-before "dopemux emergency-save && dopemux tmux stop --session dopemux"  # Emergency stop with PM save

# ============================================================================
# ADHD-Optimized Status Bar (Dopemux Enhancement)
# ============================================================================

# Status Bar Refresh (low-latency for ADHD metrics)
set-option -g status-interval 10  # 10s refresh to avoid lag

# Status Bar Colors (Gruvbox-inspired for Dopemux theme)
set-option -g status-style bg=colour0,fg=colour7  # Dark background, light foreground

# Left Status: Session + ADHD Energy
set-option -g status-left "#[bg=colour4,fg=colour15] #S #[bg=colour0,fg=colour3]#{?TMUX_ADHD_ENERGY,low,⚠️ Low:med,🟡 Med:🟢 High} "

# Right Status: ADHD Metrics + Model + Context Window + Pane Indicators
set-option -g status-right "#[bg=colour0,fg=colour4]Load: #{run-shell:~/scripts/tmux-adhd-load.sh} #[bg=colour0,fg=colour2]Dec: #{run-shell:~/scripts/tmux-conport-decisions.sh} #[bg=colour8,fg=colour15]#{@model:-Sonnet 4.5} (#{@ctx_window:-1M}) #[bg=colour0,fg=colour1]#{?pane_active,🧠:🛠️} "

# Window Status (minimal, ADHD-friendly)
set-window-option -g window-status-format "#[fg=colour7]#I:#W"
set-window-option -g window-status-current-format "#[bg=colour4,fg=colour15]#I:#W#[bg=colour0,fg=colour7]"
set-window-option -g window-status-separator " | "

# ============================================================================
# Helper Scripts for Status Bar (Created in ~/scripts/)
# ============================================================================
# tmux-adhd-load.sh: Queries ADHD Engine (port 8080) for cognitive load (0.0-1.0)
# tmux-conport-decisions.sh: Queries ConPort (port 5455) for decision count
# Set model vars: tmux set -g @model "Sonnet 4.5"; tmux set -g @ctx_window "1M"

# ============================================================================
# Dopemux Integration Notes
# ============================================================================
# - Status bar refreshes every 10s to balance real-time ADHD metrics with performance
# - Energy symbols: ⚠️ Low, 🟡 Med, 🟢 High (from TMUX_ADHD_ENERGY env var)
# - Load: Cognitive load gauge from ADHD Engine API
# - Dec: ConPort decisions count (143+ as of last log)
# - Model: Current AI model (e.g., Sonnet 4.5) with context window size (1M tokens)
# - Pane: 🧠 for active agent pane, 🛠️ for sandbox/orchestrator
# - Gruvbox colors: colour0 (dark bg), colour4 (blue accent), colour3 (yellow warnings)
# - ADHD Benefits: Progressive disclosure via symbols, quick-scan without overwhelming text
# - Performance: Scripts run <20ms, status updates low-latency
# - To Use: Source with 'tmux source-file .tmux.conf' or reload tmux session
# - Future: Extend to monitor panes (worktree/logs/metrics) with dynamic scripting