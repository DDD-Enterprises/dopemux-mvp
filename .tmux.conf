# Dopemux PM Dashboard Keybindings
# Enhanced for ADHD-optimized PM workflow control

# Core PM Navigation (Prefix = Ctrl-b)
bind-key o run-shell "dopemux tmux send orchestration:0 'next_task'"  # Get next task from ConPort
bind-key m run-shell "dopemux tmux send orchestration:1 'log_decision'"  # Log decision in ConPort
bind-key v run-shell "dopemux tmux send orchestration:3 'validate_current_task'"  # Run Playwright validation
bind-key z run-shell "dopemux tmux send orchestration:5 'consensus_review'"  # Toggle Zen consensus

# PM Dashboard Controls
bind-key p run-shell "tmux split-window -h './scripts/pm-dashboard.sh overview'"  # Show PM overview pane
bind-key P run-shell "tmux select-layout tiled"  # Rearrange panes for PM view

# Pane Focus Shortcuts (Enhanced for PM)
bind-key O select-pane -t orchestration:0  # Focus Task Orchestrator (PM Hub)
bind-key M select-pane -t orchestration:1  # Focus ConPort Memory (PM Data)
bind-key V select-pane -t orchestration:3  # Focus Validation (PM Quality)
bind-key Z select-pane -t orchestration:5  # Focus Zen Reasoning (PM Analysis)

# Workflow Commands (PM-Enhanced)
bind-key T run-shell "dopemux tmux send orchestration:2 'sync_leantime'"  # Sync with Leantime strategic PM
bind-key R run-shell "dopemux tmux send orchestration:1 'reset_context'"  # Reset ConPort context
bind-key S run-shell "dopemux save-session && dopemux tmux send orchestration:1 'checkpoint'"  # Save session to ConPort

# PM Status & Health
bind-key H run-shell "dopemux health-check && ./scripts/pm-status.sh"  # Check all MCP services + PM status
bind-key L run-shell "dopemux tmux capture orchestration:1 --lines 20"  # Show recent ConPort activity

# ADHD-Optimized Controls
bind-key B run-shell "dopemux break-reminder"  # Trigger break reminder (ADHD Engine)
bind-key E run-shell "dopemux energy-check"  # Check current energy level
bind-key F run-shell "dopemux focus-mode-toggle"  # Toggle ADHD focus mode

# Emergency Controls (PM-Aware)
bind-key X confirm-before "dopemux tmux send orchestration:5 'kill_session' && dopemux emergency-save"  # Kill Zen + save state
bind-key Q confirm-before "dopemux emergency-save && dopemux tmux stop --session dopemux"  # Emergency stop with PM save