# ~/.tmux.mobile.conf
#
# Configuration for the dopemux mobile environment.
# Features:
# - Prefix-less keybindings for core actions.
# - High-signal, low-noise status bar at the top.
# - OSC 52 clipboard support for native copy/paste.
# - Mouse support for easier interaction on touch devices.

# --- General Settings ---
set-option -g base-index 0
set-window-option -g pane-base-index 0
set-option -g renumber-windows on
set-option -g history-limit 20000
set-option -g status-position bottom
set-option -g focus-events on
set-option -g default-terminal "screen-256color"
set-option -sa terminal-overrides ",xterm*:Tc"

# --- Mouse Mode ---
set -g mouse on

# --- OSC 52 Clipboard Support ---
# Allows tmux to access the system clipboard, even over SSH.
set-option -g set-clipboard on
set-option -g allow-passthrough on

# --- Keybindings (no prefix via -n) ---
# These bindings are designed to be easy to use on mobile keyboards.

# Window Jumps (F1-F7)
bind -n F1 select-window -t :=0
bind -n F2 select-window -t :=1
bind -n F3 select-window -t :=2
bind -n F4 select-window -t :=3
bind -n F5 select-window -t :=4
bind -n F6 select-window -t :=5
bind -n F7 select-window -t :=6

# Window Cycling
bind -n C-] next-window
bind -n C-[ previous-window

# Pane Management
bind -n 'C-\' last-pane # Toggle between current and last-used pane
bind -n C-z resize-pane -Z # Zoom/unzoom current pane

# --- Status Line ---
# High-signal, low-noise.

# Colors and Styles
set -g status-style "fg=white,bg=black"
set -g message-style "fg=black,bg=green"
set -g pane-border-style "fg=gray"
set -g pane-active-border-style "fg=green"

# Left Side: Project Name
set -g status-left-length 50
set -g status-left "#[fg=green,bold] dopemux #[default]"

# Right Side: Git Branch and Time
# The git command will show nothing if not in a git repository.
set -g status-right-length 100
set -g status-right "#[fg=yellow]#(git -C '#{pane_current_path}' rev-parse --abbrev-ref HEAD 2>/dev/null) #[fg=white]%H:%M #[default]"

# Center: Window List
set -g status-justify left
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=cyan,bold] #I:#W* #[default]"
set -g window-status-separator ""
